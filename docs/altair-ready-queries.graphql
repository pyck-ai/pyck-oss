# ====================
# TESTING AUTHORIZATION
# ====================

# Test if current user can read roles
query TestRoleReadPermission {
  roles(first: 1) {
    totalCount
    edges {
      node {
        id
        name
      }
    }
  }
}

# Test if current user can read policies
query TestPolicyReadPermission {
  policies(first: 1) {
    totalCount
    edges {
      node {
        id
        resource
        action
      }
    }
  }
}

