# ====================
# POLICY MANAGEMENT (Altair Ready)
# ====================

# Query all policies with pagination
query GetAllPolicies {
  policies {
    totalCount
    edges {
      node {
        id
        resource
        action
        effect
        tenantId
        createdAt
        updatedAt
        role {
          id
          name
          description
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}

# Create management.role read policy (replace roleId with actual ID)
mutation CreateRoleReadPolicy {
  createPolicy(input: {
    resource: "management.role"
    action: "read"
    effect: "allow"
    roleId: "01234567-89ab-cdef-0123-456789abcdef"
  }) {
    id
    resource
    action
    effect
    tenantId
    createdAt
  }
}

# ====================
# USER MANAGEMENT (Altair Ready)
# ====================

# Query all users with their roles and permissions
query GetAllUsers {
  users {
    totalCount
    edges {
      node {
        id
        email
        firstName
        lastName
        tenantId
        tenantId
        createdAt
        updatedAt
        roles {
          id
          name
          description
          policies {
            id
            resource
            action
            effect
          }
        }
        groups {
          id
          name
          description
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}

# Query current authenticated user
query GetCurrentUser {
  me {
    id
    email
    firstName
    lastName
    tenantId
    tenantId
    roles {
      id
      name
      description
      policies {
        id
        resource
        action
        effect
      }
    }
    groups {
      id
      name
      description
      roles {
        id
        name
      }
    }
  }
}

