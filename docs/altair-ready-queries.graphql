# GraphQL Queries ready for Altair/GraphQL Playground
# These queries have concrete values and pagination format like your picking example

# ====================
# ROLE MANAGEMENT (Altair Ready)
# ====================

# Query all roles with pagination (like your picking example)
query GetAllRoles {
  roles {
    totalCount
    edges {
      node {
        id
        name
        description
        tenantID
        createdAt
        updatedAt
        policies {
          id
          resource
          action
          effect
        }
        users {
          id
          email
          firstName
          lastName
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}

# Query single role (replace the UUID with actual role ID)
query GetSpecificRole {
  role(id: "01234567-89ab-cdef-0123-456789abcdef") {
    id
    name
    description
    tenantID
    createdAt
    updatedAt
    policies {
      id
      resource
      action
      effect
    }
    users {
      id
      email
      firstName
      lastName
    }
  }
}

# Create warehouse-manager role (no variables needed)
mutation CreateWarehouseManagerRole {

  createRole(input: {
    name: "warehouse-manager"
    description: "Warehouse Manager - can manage all management functions in this warehouse"
  }) {
    id
    name
    description
    tenantId
    createdAt
    updatedAt
  }
}

