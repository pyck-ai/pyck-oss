# ====================
# USER MANAGEMENT
# ====================

# Query current user with roles and permissions
query GetCurrentUser {
  me {
    id
    email
    firstName
    lastName
    tenantId
    tenantId
    roles {
      id
      name
      description
      policies {
        id
        resource
        action
        effect
      }
    }
    groups {
      id
      name
      description
      roles {
        id
        name
      }
    }
  }
}

# ====================
# WAREHOUSE SETUP
# ====================

# Create warehouse-manager role with all permissions
mutation CreateWarehouseManagerRole($name: String!, $description: String) {
  createRole(input: {
    name: $name
    description: $description
  }) {
    id
    name
    description
  }
}

# Create management policies for warehouse-manager
mutation CreateManagementPolicies($roleId: UUID!) {
  # Role management policies
  createRoleReadPolicy: createPolicy(input: {
    resource: "management.role"
    action: "read"
    effect: "allow"
    roleId: $roleId
  }) { id }
  
  createRoleWritePolicy: createPolicy(input: {
    resource: "management.role"
    action: "write"
    effect: "allow"
    roleId: $roleId
  }) { id }
  
  createRoleDeletePolicy: createPolicy(input: {
    resource: "management.role"
    action: "delete"
    effect: "allow"
    roleId: $roleId
  }) { id }
  
  # Group management policies
  createGroupReadPolicy: createPolicy(input: {
    resource: "management.group"
    action: "read"
    effect: "allow"
    roleId: $roleId
  }) { id }
  
  createGroupWritePolicy: createPolicy(input: {
    resource: "management.group"
    action: "write"
    effect: "allow"
    roleId: $roleId
  }) { id }
  
  createGroupDeletePolicy: createPolicy(input: {
    resource: "management.group"
    action: "delete"
    effect: "allow"
    roleId: $roleId
  }) { id }
  
  # Policy management policies
  createPolicyReadPolicy: createPolicy(input: {
    resource: "management.policy"
    action: "read"
    effect: "allow"
    roleId: $roleId
  }) { id }
  
  createPolicyWritePolicy: createPolicy(input: {
    resource: "management.policy"
    action: "write"
    effect: "allow"
    roleId: $roleId
  }) { id }
  
  createPolicyDeletePolicy: createPolicy(input: {
    resource: "management.policy"
    action: "delete"
    effect: "allow"
    roleId: $roleId
  }) { id }
  
  # User management policies
  createUserReadPolicy: createPolicy(input: {
    resource: "management.user"
    action: "read"
    effect: "allow"
    roleId: $roleId
  }) { id }
  
  createUserWritePolicy: createPolicy(input: {
    resource: "management.user"
    action: "write"
    effect: "allow"
    roleId: $roleId
  }) { id }
  
  # Tenant read policy
  createTenantReadPolicy: createPolicy(input: {
    resource: "management.tenant"
    action: "read"
    effect: "allow"
    roleId: $roleId
  }) { id }
}

