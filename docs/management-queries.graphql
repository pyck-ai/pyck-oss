# GraphQL Queries and Mutations for Management Service
# This file contains important queries for warehouse management operations

# ====================
# ROLE MANAGEMENT
# ====================

# Query single role
query GetRole($id: UUID!) {
  role(id: $id) {
    id
    name
    description
    tenantId
    createdAt
    updatedAt
    policies {
      id
      resource
      action
      effect
    }
    users {
      id
      email
      firstName
      lastName
    }
    groups {
      id
      name
      description
    }
  }
}

# Create new role
mutation CreateRole($input: CreateRoleInput!) {
  createRole(input: $input) {
    id
    name
    description
    tenantId
    createdAt
    updatedAt
  }
}

# Update existing role
mutation UpdateRole($id: UUID!, $input: UpdateRoleInput!) {
  updateRole(id: $id, input: $input) {
    id
    name
    description
    updatedAt
  }
}

# Delete role
mutation DeleteRole($id: UUID!) {
  deleteRole(id: $id)
}

