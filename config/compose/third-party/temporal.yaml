services:
  temporal:
    container_name: temporal
    build:
      context: ../../../
      dockerfile: ./backend/temporal/Dockerfile.autosetup
      network: host
    restart: always
    ports:
      - 7031:7031  # Delve debug port
      - 7233:7233  # this is the public frontend port, protected by our authorizer
      - 7234:7234  # this is the public frontend port, protected by our authorizer
      - 7235:7235  # this is the public frontend port, protected by our authorizer
      - 7236:7236  # this is the public frontend port, protected by our authorizer
    networks:
      - pyck
    extra_hosts:
      - "auth.local.pyck.cloud:172.30.0.100"
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    env_file: ../../../.env
    environment:
      # TODO(michael): Instead of hard-coding these here, we should read them
      # from our .env file during container startup.
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=db   # db host
      - POSTGRES_USER=admin # db admin role
      - POSTGRES_PWD=12345  # db admin password
      - PYCK_LOG_FORMAT=console
      # Memory optimization settings
      - GOGC=100
      - GOMEMLIMIT=256MiB
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - ./../../../config/temporal/dynamicconfig/:/etc/temporal/config/dynamicconfig/:Z
      - ./../../keys/zitadel_certificate.crt:/etc/ssl/certs/zitadel.crt:ro,z
      - ./../../keys/local-key.json:/data/keys/local-key.json:ro,z
    depends_on:
      db: { condition: service_healthy }
      nats: { condition: service_healthy }
      zitadel: { condition: service_healthy }

  temporal-admin:
    container_name: temporal-admin
    image: temporalio/admin-tools:latest
    networks:
      - pyck
    environment:
      - TEMPORAL_ADDRESS=temporal:7236
      - TEMPORAL_CLI_ADDRESS=temporal:7236
    tty: true
    stdin_open: true
    depends_on:
      temporal: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 32M

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:latest
    networks:
      - pyck
    environment:
      - TEMPORAL_ADDRESS=temporal:7236
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - 3000:8080
    deploy:
      resources:
        limits:
          memory: 32M
    depends_on:
      temporal: { condition: service_healthy }
