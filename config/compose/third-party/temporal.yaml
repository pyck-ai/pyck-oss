---
services:
  temporal:
    container_name: temporal
    build:
      context: ../../../
      dockerfile: ./backend/temporal/Dockerfile
      network: host
    restart: always
    ports:
      - 7031:7031  # Delve debug port
      - 7233:7233  # this is the public frontend port, protected by our authorizer
      - 7236:7236  # this is the internal frontend port
    healthcheck:
      # The temporal CLI was removed from the temporalio/server image in 1.30,
      # so health is checked via our server binary's own health command.
      test: ["CMD", "temporal-server", "health"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 60s
    entrypoint: ["/bin/sh", "-c", "exec /etc/temporal/entrypoint.sh"]
    environment:
      # Memory optimization settings
      - GOGC=100
      - GOMEMLIMIT=256MiB
    env_file:
      - path: ../../../config/keys/bootstrap.env
      - path: ./../../../config/temporal/compose.env
      - path: ../../../.env
      - path: ../../../.env.local
        required: false
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - ./../../../:/src:ro,z
      - ./../../../config/temporal/dynamicconfig/:/etc/temporal/config/dynamicconfig/:Z
      - ./../../keys/:/data/keys/:ro,z
    depends_on:
      temporal-setup: { condition: service_completed_successfully }

---
services:
  temporal-setup:    
    build:
      context: ../../../
      dockerfile: ./backend/temporal/Dockerfile.db
    restart: on-failure
    environment:
      - SKIP_SCHEMA_SETUP=false
      - SKIP_DB_CREATE=false
    env_file:
      - path: ../../../config/keys/bootstrap.env
      - path: ./../../../config/temporal/compose.env
    depends_on:
      db: { condition: service_healthy }      
    deploy:
      resources:
        limits:
          memory: 128M

---
services:
  temporal-admintools:
    container_name: temporal-admin
    image: temporalio/admin-tools:1.31.1
    environment:
      - TEMPORAL_ADDRESS=temporal:7236
      - TEMPORAL_CLI_ADDRESS=temporal:7236
    env_file:
      - path: ../../../config/keys/bootstrap.env
      - path: ./../../../config/temporal/compose.env
    tty: true
    stdin_open: true
    depends_on:
      temporal: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 32M

---
services:
  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:2.51.0
    environment:
      - TEMPORAL_ADDRESS=temporal:7236
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - 3000:8080
    deploy:
      resources:
        limits:
          memory: 32M
    depends_on:
      temporal: { condition: service_healthy }
