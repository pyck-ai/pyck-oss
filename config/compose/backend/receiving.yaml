services:
  receiving:
    container_name: pyck-receiving
    build:
      context: ../../../
      dockerfile: ./backend/Dockerfile
      args:
        - SERVICE_NAME=receiving
        - SERVICE_PORT=8087
      network: host
    restart: always
    env_file:
      - path: ../../../config/keys/bootstrap.env
      - path: ../../../.env
      - path: ../../../.env.local
        required: false
    volumes:
      - ./../../../:/src:ro,z
      - ./../../../backend/receiving/ent/migrate/migrations/:/app/receiving/ent/migrate/migrations/:z
      - ./../../keys/:/data/keys/:ro,z
    ports:
      - "7087:7087"
      - "8087:8087"
    depends_on:
      gateway: { condition: service_healthy }
      management: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8087"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 64M
