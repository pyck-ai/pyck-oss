services:
  picking:
    container_name: pyck-picking
    build:
      context: ../../../
      dockerfile: ./backend/Dockerfile
      args:
        - SERVICE_NAME=picking
        - SERVICE_PORT=8086
      network: host
    restart: always
    env_file:
      - path: ../../../config/keys/bootstrap.env
      - path: ../../../.env
      - path: ../../../.env.local
        required: false
    volumes:
      - ./../../../:/src:ro,z
      - ./../../../backend/picking/ent/migrate/migrations/:/app/picking/ent/migrate/migrations/:z
      - ./../../keys/:/data/keys/:ro,z
    ports:
      - "7086:7086"
      - "8086:8086"
    depends_on:
      gateway: { condition: service_healthy }
      management: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8086"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 64M
