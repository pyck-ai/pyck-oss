services:
  main-data:
    container_name: pyck-maindata
    build:
      context: ../../../
      dockerfile: ./backend/Dockerfile
      args:
        - SERVICE_NAME=main-data
        - SERVICE_PORT=8081
      network: host
    restart: always
    env_file:
      - path: ../../../config/keys/bootstrap.env
      - path: ../../../.env
      - path: ../../../.env.local
        required: false
    volumes:
      - ./../../../:/src:ro,z
      - ./../../../backend/main-data/ent/migrate/migrations/:/app/main-data/ent/migrate/migrations/:z
      - ./../../keys/:/data/keys/:ro,z
    ports:
      - "7081:7081"
      - "8081:8081"
    depends_on:
      gateway: { condition: service_healthy }
      management: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8081"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 64M
