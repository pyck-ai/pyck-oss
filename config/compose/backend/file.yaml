services:
  file:
    container_name: pyck-file
    build:
      context: ../../../
      dockerfile: ./backend/Dockerfile
      args:
        - SERVICE_NAME=file
        - SERVICE_PORT=8088
      network: host
    restart: always
    env_file:
      - path: ../../../config/keys/bootstrap.env
      - path: ../../../.env
      - path: ../../../.env.local
        required: false
    volumes:
      - ./../../../:/src:ro,z
      - ./../../../backend/file/ent/migrate/migrations/:/app/file/ent/migrate/migrations/:z
      - ./../../keys/:/data/keys/:ro,z
    ports:
      - "7088:7088"
      - "8088:8088"
    depends_on:
      gateway: { condition: service_healthy }
      management: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8088"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 64M
