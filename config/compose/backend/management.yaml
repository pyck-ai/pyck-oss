services:
  management:
    container_name: management
    build:
      context: ../../../
      dockerfile: ./backend/Dockerfile
      args:
        - SERVICE_NAME=management
        - SERVICE_PORT=8082
      network: host
    restart: always
    env_file: ../../../.env
    environment:
      - PYCK_LOG_FORMAT=console
    volumes:
      - ./../../../backend/management/ent/migrate/migrations/:/app/management/ent/migrate/migrations/:z
      - ./../../keys/zitadel_certificate.crt:/etc/ssl/certs/zitadel.crt:ro,z
      - ./../../keys/local-key.json:/data/keys/local-key.json:ro,z
      - ./../../keys/zitadel-admin-sa.json:/data/keys/zitadel-admin-sa.json:ro,z
    ports:
      - "7082:7082"
      - "8082:8082"
    networks:
      - pyck
    extra_hosts:
      - "auth.local.pyck.cloud:172.30.0.100"
    depends_on:
      db: { condition: service_healthy }
      nats: { condition: service_healthy }
      temporal: { condition: service_healthy }
      zitadel: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8082"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
