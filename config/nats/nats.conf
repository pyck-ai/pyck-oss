# NATS Server Configuration - Optimized for Low Memory Usage
# Based on https://docs.nats.io/running-a-nats-service/configuration
# Optimized for minimal memory while preserving all features

# Server Limits - Core settings for memory optimization
server_name: "pyck-nats"
port: 4222
monitor_port: 8222

# Connection Limits - Support ~50 connections with minimal memory
max_connections: 100         # Allow headroom for 50 active connections
max_pending: 256KB           # Reduced from 64MB default
max_payload: 128KB           # Reduced from 1MB default
max_control_line: 512        # Reduced from 32KB default

# Subscription Limits
max_subscriptions: 0         # 0 = unlimited (let apps manage)

# Write Deadline - Timeout for writes
write_deadline: "10s"

# Logging Configuration - Log to stdout/stderr for Docker
debug: false
trace: false
logtime: true
# No log_file - logs go to stdout/stderr by default
max_traced_msg_len: 0       # Disable message content tracing

# Ping Settings - Detect stale connections faster
ping_interval: "2m"         # How often server pings clients
ping_max: 2                 # Max outstanding pings before disconnect

# System Account - Required for monitoring and system events
system_account: "SYS"

# Authorization Block - No unauthenticated access allowed
authorization {
  # Auth callout configuration for external authentication
  auth_callout {
    issuer: "AA3BB5OV5PGBB3R3RWTHZZR3AA3BDT72DIZ7H7O4ZFXIFLGG67LNL33V"
    auth_users: ["root"]
    account: "PYCK"
  }
  timeout: 1
}

# Accounts Configuration - No DEFAULT account for security
accounts {
  # System Account - For internal monitoring
  SYS {
    users: [
      {user: "sys", password: "sys"}
    ]
  }
  
  # Application Account with resource limits
  PYCK {
    # JetStream enabled for this account
    jetstream: enabled
    
    # Account limits to control memory per account
    limits {
      max_connections: 50      # Support 50 connections
      max_subscriptions: 1000
      max_payload: 128KB
    }
    
    # Account users - authentication required
    users: [
      {user: $NATS_USER, password: $NATS_PASSWORD}
    ]
  }
  
  # NO DEFAULT account - authentication required for all connections
}

# JetStream Configuration - Optimized for low memory (single instance)
jetstream {
  # Storage directory
  store_dir: "/usr/local/nats-server/data"
  
  # Global JetStream limits - minimal memory usage
  max_memory_store: 64MB      # Reduced from 128MB
  max_file_store: 256MB       # Reduced from 512MB
  
  # Performance tuning for low memory
  max_outstanding_catchup: 4MB  # Reduced from 8MB
  
  # Sync settings - balance between safety and performance
  sync_interval: "1m"         # Less frequent syncs to reduce I/O
}

# Cluster Configuration - Disabled for single node
# Uncomment this block if you need clustering support
# cluster {
#   name: "pyck-cluster"
#   port: 6222
#
#   # Routes to other servers
#   routes: []
#
#   # Cluster performance settings - minimal memory
#   pool_size: 2              # Reduced connection pool
#   compression: s2_fast      # Use fast compression
#
#   # Disable gossip to save memory in small clusters
#   no_advertise: true
#
#   # Connect retry settings
#   connect_retries: 10
# }

# WebSocket Configuration - Enable but optimize for memory
websocket {
  port: 8889
  no_tls: true
  
  # WebSocket specific settings
  same_origin: false
  allowed_origins: ["http://localhost", "https://localhost"]
  
  # Compression for WebSocket
  compression: true
}

# TLS Configuration (disabled for internal use)
# tls {
