# gqlgen configuration file
# see https://gqlgen.com/config/

schema:
  - graph/*.graphql

# The exec/federation output lives in its own `exec` subpackage rather than the
# module root. gqlgen's post-codegen validation runs `go build` across the exec,
# model and resolver import paths plus their subpackages. With exec at the module
# root that wildcard covers the whole module and pulls in packages that import
# this service's generated GraphQL API client (api/*_gen.go), which is produced
# later in the pipeline by gqlgenc + apigenc. On a clean build (after `task
# clean`) that client doesn't exist yet, so validation fails with "undefined:
# <svc>api.Client". Scoping exec to a subpackage limits validation to the
# generated server code, which never imports the client, so generation
# bootstraps cleanly. Do not move these back to the module root.
exec:
  filename: exec/gqlgen_gen.go

federation:
  filename: exec/gqlgen_federation_gen.go
  version: 2

model:
  filename: model/gqlgen_gen.go
  package: model

resolver:
  layout: follow-schema
  dir: resolvers
  package: resolvers
  filename_template: "{name}.resolvers.go"

omit_gqlgen_version_in_file_notice: true

# @pyckImportable is used at code generation time by importgen, not at runtime.
directives:
  pyckImportable:
    skip_runtime: true

skip_validation: false

skip_mod_tidy: false

# autobind tells gqlgen to search for any type names in the GraphQL schema in the
# provided package. If they match it will use them, otherwise it will generate new.
autobind:
  - github.com/99designs/gqlgen/graphql/introspection
  - github.com/pyck-ai/pyck/backend/main-data/ent/gen
  - github.com/pyck-ai/pyck/backend/main-data/ent/gen/customer
  - github.com/pyck-ai/pyck/backend/main-data/ent/gen/supplier

# This section declares type mapping between the GraphQL and Go type systems.
models:
  # NFC-normalize every String argument & response (issue #824).
  String:
    model:
      - github.com/pyck-ai/pyck/backend/common/gqlscalar.NormalizedString
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.UUID
  UUID:
    model:
      - github.com/99designs/gqlgen/graphql.UUID
  Map:
    model:
      - github.com/99designs/gqlgen/graphql.Map
  JSONPatchOp:
    model:
      - github.com/pyck-ai/pyck/backend/common/jsonpatch.JSONPatchOp
  JSONPatchInput:
    model:
      - github.com/pyck-ai/pyck/backend/common/jsonpatch.JSONPatchInput
  Node:
    model:
      - github.com/pyck-ai/pyck/backend/main-data/ent/gen.Noder
