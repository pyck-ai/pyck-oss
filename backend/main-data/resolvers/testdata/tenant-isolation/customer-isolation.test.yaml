name: customer-isolation
description: Verify customers are isolated between tenants

seed:
  tenants:
    - name: alpha
    - name: beta

  customers:
    - name: cust-alpha-1
      tenant: alpha
    - name: cust-alpha-2
      tenant: alpha
    - name: cust-beta-1
      tenant: beta

checks:
  # --- Read isolation ---
  - type: query
    entity: customer
    tenant: alpha
    description: "alpha sees only own customers"
    expectCount: 2

  - type: query
    entity: customer
    tenant: beta
    description: "beta sees only own customers"
    expectCount: 1

  # --- Cross-tenant update + verify unchanged ---
  - type: cross-update
    entity: customer
    tenant: alpha
    target: beta/cust-beta-1
    description: "alpha cannot update beta's customer"
    expectError: "not found"

  - type: query
    entity: customer
    tenant: beta
    description: "beta still has 1 customer after failed cross-update"
    expectCount: 1

  # --- Cross-tenant delete + verify still exists ---
  - type: cross-delete
    entity: customer
    tenant: alpha
    target: beta/cust-beta-1
    description: "alpha cannot delete beta's customer"
    expectError: "not found"

  - type: query
    entity: customer
    tenant: beta
    description: "beta still has 1 customer after failed cross-delete"
    expectCount: 1
