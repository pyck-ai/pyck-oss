---
name: "Cross - Customer Data Type Slug Reference"
description: >
  Creates a data type with a slug and references it by slug when
  creating and updating customers. Verifies dataTypeID and
  dataTypeSlug are persisted.
steps:
  - id: createDT
    name: "Create data type with slug for customers"
    operation: management.createDataType
    vars:
      input:
        name: "Slug Customer Type"
        slug: {$fake: "{{loremslug}}-{{nonce}}"}
        entity: "customer"
        jsonSchema: '{"type":"object","properties":{"contactEmail":{"type":"string"},"active":{"type":"boolean"}}}'
    tests:
      - msg: "Status is 200"
        assertions:
          - ref: res.status
            equal: 200
      - msg: "No GraphQL errors"
        assertions:
          - ref: res.body.errors
            nil: true
      - msg: "Data type created with slug"
        assertions:
          - ref: res.body.data.createDataType.id
            nil: false
          - ref: res.body.data.createDataType.slug
            nil: false

  - id: create
    name: "Create customer via slug"
    operation: main-data.createCustomer
    vars:
      input:
        dataTypeSlug: {$ref: "res[createDT].body.data.createDataType.slug"}
        data:
          contactEmail: "info@acme.test"
          active: true
    tests:
      - msg: "Status is 200"
        assertions:
          - ref: res.status
            equal: 200
      - msg: "No GraphQL errors"
        assertions:
          - ref: res.body.errors
            nil: true
      - msg: "Customer created"
        assertions:
          - ref: res.body.data.createCustomer.id
            nil: false
      - msg: "DataTypeID persisted from slug"
        assertions:
          - ref: res.body.data.createCustomer.dataTypeID
            equal: {$ref: "res[createDT].body.data.createDataType.id"}
      - msg: "DataTypeSlug persisted"
        assertions:
          - ref: res.body.data.createCustomer.dataTypeSlug
            equal: {$ref: "res[createDT].body.data.createDataType.slug"}

  - name: "Verify persistence on query"
    operation: main-data.getCustomers
    vars:
      where:
        id: {$ref: "res[create].body.data.createCustomer.id"}
    tests:
      - msg: "Status is 200"
        assertions:
          - ref: res.status
            equal: 200
      - msg: "No GraphQL errors"
        assertions:
          - ref: res.body.errors
            nil: true
      - msg: "Customer found"
        assertions:
          - ref: res.body.data.customers.totalCount
            equal: 1
      - msg: "DataTypeID persisted on query"
        assertions:
          - ref: res.body.data.customers.edges[].node.dataTypeID
            equal: {$ref: "res[createDT].body.data.createDataType.id"}
      - msg: "DataTypeSlug persisted on query"
        assertions:
          - ref: res.body.data.customers.edges[].node.dataTypeSlug
            equal: {$ref: "res[createDT].body.data.createDataType.slug"}
      - msg: "Data persisted"
        assertions:
          - ref: res.body.data.customers.edges[].node.data.contactEmail
            equal: "info@acme.test"
          - ref: res.body.data.customers.edges[].node.data.active
            equal: true

  - name: "Reject invalid data via slug"
    operation: main-data.createCustomer
    vars:
      input:
        dataTypeSlug: {$ref: "res[createDT].body.data.createDataType.slug"}
        data:
          contactEmail: 12345
    tests:
      - msg: "Status is 200"
        assertions:
          - ref: res.status
            equal: 200
      - msg: "GraphQL errors present (type mismatch)"
        assertions:
          - ref: res.body.errors
            nil: false

  - name: "Cleanup - delete customer"
    operation: main-data.deleteCustomer
    vars:
      id: {$ref: "res[create].body.data.createCustomer.id"}
    tests:
      - msg: "Status is 200"
        assertions:
          - ref: res.status
            equal: 200
      - msg: "No GraphQL errors"
        assertions:
          - ref: res.body.errors
            nil: true

  - name: "Cleanup - delete data type"
    operation: management.deleteDataType
    vars:
      id: {$ref: "res[createDT].body.data.createDataType.id"}
    tests:
      - msg: "Status is 200"
        assertions:
          - ref: res.status
            equal: 200
      - msg: "No GraphQL errors"
        assertions:
          - ref: res.body.errors
            nil: true
