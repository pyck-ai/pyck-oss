---
name: "User - Retrieve Main Data Service Info"
description: >
  Verifies the mainDataServiceInfo query returns version.
steps:
  - name: "Get service info"
    operation: main-data.getMainDataServiceInfo
    tests:
      - msg: "Status is 200"
        assertions:
          - ref: res.status
            equal: 200
      - msg: "No GraphQL errors"
        assertions:
          - ref: res.body.errors
            nil: true
      - msg: "Version returned"
        assertions:
          - ref: res.body.data.mainDataServiceInfo.version
            nil: false
