---
operation: DeleteSupplier
name: "Delete Supplier"
description: >
  Soft-deletes a supplier by ID.
vars:
  id: { $placeholder: "supplier ID" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Deleted ID returned"
    assertions:
      - ref: res.body.data.deleteSupplier.deletedID
        equal: {$ref: req.body.variables.id}
