---
operation: PatchCustomerData
name: "Patch Customer Data"
description: >
  Applies RFC 6902 JSON Patch operations to the customer's data field.
  Only changed fields are modified; untouched fields are preserved.
  See https://datatracker.ietf.org/doc/html/rfc6902 for the specification.
vars:
  id: { $placeholder: "customer id to patch" }
  patches:
    - op: REPLACE
      path: "/tier"
      value: "\"diamond\""
    - op: REPLACE
      path: "/contacts"
      value: "10"
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Patched customer returned"
    assertions:
      - ref: res.body.data.patchCustomerData
        nil: false
      - ref: res.body.data.patchCustomerData.id
        equal: {$ref: req.body.variables.id}
