model:
  package: internal
  filename: ./api/internal/models_gen.go
client:
  package: internal
  filename: ./api/internal/client_gen.go
models:
  UUID:
    model: github.com/99designs/gqlgen/graphql.UUID
  Map:
    model: github.com/99designs/gqlgen/graphql.Map
  Any:
    model: any
  Cursor:
    model: github.com/99designs/gqlgen/graphql.String
autobind:
  - github.com/99designs/gqlgen/graphql/introspection
  - github.com/pyck-ai/pyck/backend/main-data/model
federation:
  version: 2
schema:
  - ./graph/*.graphql
query:
  - ./api/graph/*.graphql
generate:
  clientInterfaceName: "APIClient" # Determine the name of the generated client interface
  structFieldsAlwaysPointers: true # Optional: Always use pointers for struct fields (default: true). [same as gqlgen](https://github.com/99designs/gqlgen/blob/e1ef86e795e738654c98553b325a248c02c8c2f8/docs/content/config.md?plain=1#L73)
  onlyUsedModels: true # Optional: Only generate used models
  enableClientJsonOmitemptyTag: true # Optional: Controls whether the "omitempty" option is added to JSON tags (default: true)

