---
operation: GetRole
name: "Get Role"
description: >
  Retrieves a single role by ID including its policies and users.
vars:
  id: { $placeholder: "role ID" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Role returned"
    assertions:
      - ref: res.body.data.role.id
        nil: false
