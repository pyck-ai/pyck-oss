---
operation: DeleteRole
name: "Delete Role"
description: >
  Deletes a role by ID. Returns the deleted role ID.
vars:
  id: { $placeholder: "role ID" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Deleted ID returned"
    assertions:
      - ref: res.body.data.deleteRole
        equal: {$ref: req.body.variables.id}
