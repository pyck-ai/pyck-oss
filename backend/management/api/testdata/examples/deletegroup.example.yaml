---
operation: DeleteGroup
name: "Delete Group"
description: >
  Deletes a group by ID. Returns the deleted group ID.
vars:
  id: { $placeholder: "group ID" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Deleted ID returned"
    assertions:
      - ref: res.body.data.deleteGroup
        equal: {$ref: req.body.variables.id}
