---
operation: GetDeviceLocations
name: "Get Device Locations"
description: >
  Lists device-location assignments with pagination.
vars:
  first: 10
  orderBy:
    direction: ASC
    field: CREATED_AT
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Result set returned"
    assertions:
      - ref: res.body.data.deviceLocations.totalCount
        nil: false
