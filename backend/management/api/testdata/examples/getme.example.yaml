---
operation: GetMe
name: "Get Me"
description: >
  Returns the currently authenticated user's profile and tenant context.
vars: {}
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "User profile returned"
    assertions:
      - ref: res.body.data.me.UserID
        nil: false
      - ref: res.body.data.me.TenantID
        nil: false
