---
operation: DeletePolicy
name: "Delete Policy"
description: >
  Deletes an access policy by ID. Returns the deleted policy ID.
vars:
  id: { $placeholder: "policy ID" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Deleted ID returned"
    assertions:
      - ref: res.body.data.deletePolicy
        equal: {$ref: req.body.variables.id}
