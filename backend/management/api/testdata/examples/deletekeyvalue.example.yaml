---
operation: DeleteKeyValue
name: "Delete Key Value"
description: >
  Deletes a key-value entry by ID.
vars:
  id: { $placeholder: "key-value ID" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Deleted ID returned"
    assertions:
      - ref: res.body.data.deleteKeyValue.deletedID
        equal: {$ref: req.body.variables.id}
