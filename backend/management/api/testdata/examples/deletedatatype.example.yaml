---
operation: DeleteDataType
name: "Delete Data Type"
description: >
  Soft-deletes a data type by ID.
vars:
  id: { $placeholder: "data type ID" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Deleted ID returned"
    assertions:
      - ref: res.body.data.deleteDataType.deletedID
        equal: {$ref: req.body.variables.id}
