---
operation: CheckOutUserDevice
name: "Check Out User Device"
description: >
  Records that a user has returned a device.
vars:
  input:
    deviceID: { $placeholder: "device ID" }
    userID: { $placeholder: "user ID" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Device user record returned"
    assertions:
      - ref: res.body.data.checkOutUserDevice.deviceUser.id
        nil: false
