---
operation: UnsetDeviceLocation
name: "Unset Device Location"
description: >
  Removes a device-location assignment by device location ID.
vars:
  id: { $placeholder: "device location ID" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Deleted ID returned"
    assertions:
      - ref: res.body.data.unsetDeviceLocation.deletedID
        equal: {$ref: req.body.variables.id}
