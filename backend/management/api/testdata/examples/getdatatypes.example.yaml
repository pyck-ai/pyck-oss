---
operation: GetDataTypes
name: "Get Data Types"
description: >
  Lists data types with pagination and optional filters.
vars:
  first: 10
  orderBy:
    direction: ASC
    field: CREATED_AT
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Result set returned"
    assertions:
      - ref: res.body.data.dataTypes.totalCount
        nil: false
