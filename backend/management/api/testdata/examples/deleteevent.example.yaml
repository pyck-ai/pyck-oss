---
operation: DeleteEvent
name: "Delete Event"
description: >
  Deletes a custom event definition by ID. Returns the deleted event ID.
vars:
  id: { $placeholder: "event ID" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Deleted ID returned"
    assertions:
      - ref: res.body.data.deleteEvent
        equal: {$ref: req.body.variables.id}
