name: role-policy-isolation
description: Verify roles and access policies are isolated between tenants

seed:
  tenants:
    - name: alpha
    - name: beta

  users:
    - name: user-alpha
      tenant: alpha
    - name: user-beta
      tenant: beta

  roles:
    - name: role-alpha
      tenant: alpha
    - name: role-beta
      tenant: beta

  policies:
    - name: policy-alpha
      tenant: alpha
      role: role-alpha
      resource: "inventory.item"
      action: "read"
    - name: policy-beta
      tenant: beta
      role: role-beta
      resource: "inventory.item"
      action: "write"

checks:
  # --- Role read isolation ---
  - type: query
    entity: role
    tenant: alpha
    description: "alpha sees only own roles"
    expectCount: 1

  - type: query
    entity: role
    tenant: beta
    description: "beta sees only own roles"
    expectCount: 1

  # --- Role cross-tenant update/delete ---
  - type: cross-update
    entity: role
    tenant: alpha
    target: beta/role-beta
    description: "alpha cannot update beta's role"
    expectError: "not found"

  - type: query
    entity: role
    tenant: beta
    description: "beta still has 1 role after failed cross-update"
    expectCount: 1

  - type: cross-delete
    entity: role
    tenant: alpha
    target: beta/role-beta
    description: "alpha cannot delete beta's role"
    expectError: "not found"

  - type: query
    entity: role
    tenant: beta
    description: "beta still has 1 role after failed cross-delete"
    expectCount: 1

  # --- Policy read isolation ---
  - type: query
    entity: accessPolicy
    tenant: alpha
    description: "alpha sees only own policies"
    expectCount: 1

  - type: query
    entity: accessPolicy
    tenant: beta
    description: "beta sees only own policies"
    expectCount: 1

  - type: cross-delete
    entity: accessPolicy
    tenant: alpha
    target: beta/policy-beta
    description: "alpha cannot delete beta's policy"
    expectError: "not found"

  - type: query
    entity: accessPolicy
    tenant: beta
    description: "beta still has 1 policy after failed cross-delete"
    expectCount: 1

  # CreatePolicy now validates roleID tenant ownership.
  - type: cross-create
    entity: accessPolicy
    tenant: alpha
    description: "alpha cannot create policy linked to beta's role"
    args:
      role: beta/role-beta
      resource: "test.cross-tenant"
      action: "admin"
    expectError: "not found"

  # UpdatePolicy now validates roleID tenant ownership.
  - type: cross-update-with-args
    entity: accessPolicy
    tenant: alpha
    target: alpha/policy-alpha
    description: "alpha cannot reassign own policy to beta's role"
    args:
      roleID: beta/role-beta
    expectError: "not found"

  # CreateRole now validates userIDs tenant ownership.
  - type: cross-create-with-edges
    entity: role
    tenant: alpha
    description: "alpha cannot create role with beta's users"
    args:
      name: cross-tenant-role
      userID: beta/user-beta
    expectError: "invalid user IDs"

  # UpdateRole now validates addUserIDs tenant ownership.
  - type: cross-update-with-args
    entity: role
    tenant: alpha
    target: alpha/role-alpha
    description: "alpha cannot add beta's user to own role"
    args:
      addUserID: beta/user-beta
    expectError: "invalid user IDs"
