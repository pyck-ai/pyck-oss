name: user-isolation
description: Verify users are isolated between tenants

seed:
  tenants:
    - name: alpha
    - name: beta

  users:
    - name: user-alpha
      tenant: alpha
    - name: user-beta
      tenant: beta

checks:
  - type: query
    entity: user
    tenant: alpha
    description: "alpha sees only own users"
    expectCount: 1

  - type: query
    entity: user
    tenant: beta
    description: "beta sees only own users"
    expectCount: 1

  - type: cross-update
    entity: user
    tenant: alpha
    target: beta/user-beta
    description: "alpha cannot update beta's user"
    expectError: "not found"

  - type: query
    entity: user
    tenant: beta
    description: "beta still has 1 user after failed cross-update"
    expectCount: 1

  - type: cross-delete
    entity: user
    tenant: alpha
    target: beta/user-beta
    description: "alpha cannot delete beta's user"
    expectError: "not found"

  - type: query
    entity: user
    tenant: beta
    description: "beta still has 1 user after failed cross-delete"
    expectCount: 1
