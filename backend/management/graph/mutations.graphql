type Mutation {
  # The input and the output are types generated by Ent.
  createDataType(input: CreateDataTypeInput!): DataType
  updateDataType(id: ID!, input: UpdateDataTypeInput!): DataType
  deleteDataType(id: ID!): DataTypeDeletePayload!

  sendCustomEvent(input: SendCustomEventInput!): SendCustomEventResponse

  registerTenant(input: RegisterTenantInput!): RegisterTenantResponse!
  """
  Manually delete a tenant by setting deleted_at via soft-delete. This
  triggers the soft-delete half of the tenant lifecycle — the row
  remains in the database and can be reactivated via restoreTenant
  during the grace period. Hard-delete is automated by the periodic
  expiry sweep, not exposed to the API.

  Target tenant is derived from the X-Pyck-Tenant-Id header
  (req.MutationTenantID). The caller must hold ROLE_ADMIN on that
  tenant; ROLE_SYSTEM satisfies this for system flows.
  """
  deleteTenant: DeleteTenantResponse!
  """
  Restore a previously disabled tenant by clearing its deleted_at
  flag. An optional input.expiresAt overrides the tenant's prior
  expiry; when omitted, the prior expiry persists, which can
  re-disable the tenant on the next tenant-expiry-check sweep if the
  value is already in the past.

  Target tenant is derived from X-Pyck-Tenant-Id (req.MutationTenantID);
  ROLE_ADMIN required.
  """
  restoreTenant(input: RestoreTenantInput!): RestoreTenantResponse!
  """
  Sets or clears the tenant's expiry timestamp. Pass input.expiresAt
  as null to clear. Soft-deleted (disabled) tenants are not visible
  to this mutation — call restoreTenant first (it accepts an optional
  new expiry). Returns an error when the tenant does not exist
  (including the disabled case). The value is written directly to
  tenant.expires_at; the periodic tenant-expiry-check workflow
  soft-deletes the tenant once the timestamp is in the past.
  Idempotent on the already-at-target-state cases (clear against
  empty, set matching the current value).

  Target tenant is derived from X-Pyck-Tenant-Id (req.MutationTenantID);
  ROLE_ADMIN required.
  """
  setTenantExpiry(input: SetTenantExpiryInput!): SetTenantExpiryResponse!
  """
  Sets the per-workflow UI bundle URL templates for the tenant
  (remoteWebUITemplate / remoteMobileUITemplate in tenant.data). The
  templates carry {{.Slug}}/{{.Version}} placeholders that the workflow service
  resolves per execution from the pinned deployment version.

  Customers must never set these, so the resolver rejects any non-system
  caller (ROLE_SYSTEM / IsSystemUser). Target tenant is derived from
  X-Pyck-Tenant-Id (req.MutationTenantID). Only the provided fields are
  written; omitted fields are left unchanged. Idempotent when the values
  already match.
  """
  setTenantUITemplate(input: SetTenantUITemplateInput!): SetTenantUITemplateResponse!
  generateJsonSchema(jsonData: String!): GenerateJsonSchemaResponse!

  # User CRUD operations
  createUser(input: CreateUserInput!): User!
  updateUser(id: ID!, input: UpdateUserInput!): User!
  deleteUser(id: ID!): Boolean!

  # Event CRUD operations (admin only)
  createEvent(input: CreateEventInput!): Event!
  updateEvent(id: ID!, input: UpdateEventInput!): Event!
  deleteEvent(id: ID!): Boolean!

  setKeyValue(input: SetKeyValueInput!): KeyValue
  deleteKeyValue(id: ID!): KeyValueDeletePayload!

  createLocation(input: CreateLocationInput!): LocationOutput!
  updateLocation(id: ID!, input: UpdateLocationInput!): LocationOutput!
  deleteLocation(id: ID!): LocationDeletePayload!

  createDevice(input: CreateDeviceInput!): DeviceOutput!
  updateDevice(id: ID!, input: UpdateDeviceInput!): DeviceOutput!
  deleteDevice(id: ID!): DeviceDeletePayload!

  setDeviceLocation(input: CreateDeviceLocationInput!): DeviceLocationOutput!
  unsetDeviceLocation(id: ID!): DeviceLocationDeletePayload!

  checkInUserDevice(input: CheckInUserDeviceInput!): CheckInUserDeviceOutput!
  checkOutUserDevice(input: CheckOutUserDeviceInput!): CheckOutUserDeviceOutput!

  """Apply RFC 6902 JSON Patch operations to the location's data field."""
  patchLocationData(id: ID!, patches: [JSONPatchInput!]!): LocationOutput!
  """Apply RFC 6902 JSON Patch operations to the device's data field."""
  patchDeviceData(id: ID!, patches: [JSONPatchInput!]!): DeviceOutput!
  """Apply RFC 6902 JSON Patch operations to the device location's data field."""
  patchDeviceLocationData(id: ID!, patches: [JSONPatchInput!]!): DeviceLocationOutput!
}

scalar UUID

type RegisterTenantResponse {
  success: Boolean!
  tenant: Tenant
}

input CheckInUserDeviceInput {
    deviceID: UUID!
}

type CheckInUserDeviceOutput {
    deviceUser: DeviceUser!
    workflows: [TemporalWorkflow!]!
}


input CheckOutUserDeviceInput {
    deviceID: UUID!
}

type CheckOutUserDeviceOutput {
    deviceUser: [DeviceUser!]!
    workflows: [TemporalWorkflow!]!
}
