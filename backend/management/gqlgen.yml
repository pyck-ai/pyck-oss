# gqlgen configuration file
# see https://gqlgen.com/config/

schema:
  - graph/*.graphql

# The exec/federation output lives in its own `exec` subpackage rather than the
# module root. gqlgen's post-codegen validation runs `go build` over the exec,
# model and resolver import paths plus their subpackages. With exec at the module
# root that wildcard expands to the whole module, which drags in packages that
# import this service's generated GraphQL API client (api/*_gen.go) — e.g. guard
# and pkg/datatypes. That client is generated later in the pipeline (gqlgenc +
# apigenc), so on a clean build (after `task clean`) validation would fail with
# "undefined: <svc>api.Client". Keeping exec in a subpackage scopes validation to
# the generated server code only, which never imports the client, so the pipeline
# bootstraps cleanly. Do not move these back to the module root.
exec:
  filename: exec/gqlgen_gen.go

federation:
  filename: exec/gqlgen_federation_gen.go
  version: 2

model:
  filename: model/gqlgen_gen.go
  package: model

resolver:
  layout: follow-schema
  dir: resolvers
  package: resolvers
  filename_template: "{name}.resolvers.go"

# @pyckImportable is used at code generation time by importgen, not at runtime.
directives:
  pyckImportable:
    skip_runtime: true

omit_gqlgen_version_in_file_notice: true

skip_validation: false

skip_mod_tidy: false

# autobind tells gqlgen to search for any type names in the GraphQL schema in the
# provided package. If they match it will use them, otherwise it will generate new.
autobind:
  - github.com/99designs/gqlgen/graphql/introspection
  - github.com/pyck-ai/pyck/backend/management/ent/gen
  - github.com/pyck-ai/pyck/backend/management/ent/gen/accesspolicy
  - github.com/pyck-ai/pyck/backend/management/ent/gen/datatype
  - github.com/pyck-ai/pyck/backend/management/ent/gen/device
  - github.com/pyck-ai/pyck/backend/management/ent/gen/devicelocation
  - github.com/pyck-ai/pyck/backend/management/ent/gen/deviceuser
  - github.com/pyck-ai/pyck/backend/management/ent/gen/event
  - github.com/pyck-ai/pyck/backend/management/ent/gen/group
  - github.com/pyck-ai/pyck/backend/management/ent/gen/keyvalue
  - github.com/pyck-ai/pyck/backend/management/ent/gen/role
  - github.com/pyck-ai/pyck/backend/management/ent/gen/tenant
  - github.com/pyck-ai/pyck/backend/management/ent/gen/user

# This section declares type mapping between the GraphQL and Go type systems.
models:
  # NFC-normalize every String argument & response (issue #824).
  String:
    model:
      - github.com/pyck-ai/pyck/backend/common/gqlscalar.NormalizedString
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.UUID
  UUID:
    model:
      - github.com/99designs/gqlgen/graphql.UUID
  Map:
    model:
      - github.com/99designs/gqlgen/graphql.Map
  JSONPatchOp:
    model:
      - github.com/pyck-ai/pyck/backend/common/jsonpatch.JSONPatchOp
  JSONPatchInput:
    model:
      - github.com/pyck-ai/pyck/backend/common/jsonpatch.JSONPatchInput
  Node:
    model:
      - github.com/pyck-ai/pyck/backend/management/ent/gen.Noder
  CustomEvent:
    model:
      - github.com/pyck-ai/pyck/backend/management/model.CustomEvent
