operation: DeleteFile
name: Delete file
description: Soft-deletes a file by ID.
vars:
  id: { $placeholder: "file ID" }
expect:
  - msg: Status is 200
    assertions:
      - ref: res.status
        equal: 200
  - msg: No GraphQL errors
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: Deleted ID returned
    assertions:
      - ref: res.body.data.deleteFile.deletedID
        equal: {$ref: req.body.variables.id}
