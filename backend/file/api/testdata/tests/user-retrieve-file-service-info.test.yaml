name: "User - Retrieve File Service Info"
description: Verifies that the file service info endpoint returns a version and date.
steps:
  - name: Get file service info
    operation: file.getFileServiceInfo
    tests:
      - msg: Status is 200
        assertions:
          - ref: res.status
            equal: 200
      - msg: No GraphQL errors
        assertions:
          - ref: res.body.errors
            nil: true
      - msg: Version returned
        assertions:
          - ref: res.body.data.fileServiceInfo.version
            nil: false
