
type Mutation {
  createFile(input: CreateFileInput!): CreateFileResult
  updateFile(id: ID!, input: UpdateFileInput!): File
  deleteFile(id: ID!): FileDeletePayload!

  analyzeImageFile(id: ID!): ImageAnalysisResponse!

  """Apply RFC 6902 JSON Patch operations to the file's data field."""
  patchFileData(id: ID!, patches: [JSONPatchInput!]!): File
}

scalar UUID

type FileDeletePayload {
  deletedID: ID
}

type GetPreSignedUploadUrlPayload {
  url: String
}

type CreateFileResult {
  id: ID!
  preSignedUploadUrl: String
  file: File
}

type ImageAnalysisResponse {
  jsonData: String!
}