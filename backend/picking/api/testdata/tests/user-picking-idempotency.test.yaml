---
name: "User - Picking Idempotency"
description: >
  Idempotency-Key middleware exercise on the picking service via
  createPickingOrder. See backend/inventory/api/testdata/tests/cross-inventory-idempotency.test.yaml
  for the full design notes — this fixture mirrors it.

steps:
  - id: fresh
    name: "Fresh call with key"
    operation: picking.createPickingOrder
    headers:
      Idempotency-Key: "bruno-idem-picking-replay-001"
    vars:
      input:
        customerID: "00000000-0000-0000-0000-000000000001"
    tests:
      - msg: "Status is 200"
        assertions:
          - ref: res.status
            equal: 200
      - msg: "No errors"
        assertions:
          - ref: res.body.errors
            nil: true
      - msg: "PickingOrder created"
        assertions:
          - ref: res.body.data.createPickingOrder.pickingOrder.id
            nil: false

  - id: replay
    name: "Replay with the same key"
    operation: picking.createPickingOrder
    headers:
      Idempotency-Key: "bruno-idem-picking-replay-001"
    vars:
      input:
        customerID: "00000000-0000-0000-0000-000000000001"
    tests:
      - msg: "Status is 200"
        assertions:
          - ref: res.status
            equal: 200
      - msg: "No errors"
        assertions:
          - ref: res.body.errors
            nil: true
      - msg: "Same PickingOrder id as fresh call"
        assertions:
          - ref: res.body.data.createPickingOrder.pickingOrder.id
            equal: {$ref: "res[fresh].body.data.createPickingOrder.pickingOrder.id"}

  - id: mismatch
    name: "Same key, different variables — OPERATION_MISMATCH"
    operation: picking.createPickingOrder
    headers:
      Idempotency-Key: "bruno-idem-picking-replay-001"
    vars:
      input:
        customerID: "00000000-0000-0000-0000-0000000000ff"
    tests:
      - msg: "errors[].extensions.code is OPERATION_MISMATCH"
        assertions:
          - ref: res.body.errors[0].extensions.code
            equal: "OPERATION_MISMATCH"
      - msg: "errors[].extensions.httpStatus is 422"
        assertions:
          - ref: res.body.errors[0].extensions.httpStatus
            equal: 422

  - id: malformedKey
    name: "256-char key — INVALID_IDEMPOTENCY_KEY"
    operation: picking.createPickingOrder
    headers:
      Idempotency-Key: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
    vars:
      input:
        customerID: "00000000-0000-0000-0000-000000000001"
    tests:
      - msg: "errors[].extensions.code is INVALID_IDEMPOTENCY_KEY"
        assertions:
          - ref: res.body.errors[0].extensions.code
            equal: "INVALID_IDEMPOTENCY_KEY"
      - msg: "errors[].extensions.httpStatus is 400"
        assertions:
          - ref: res.body.errors[0].extensions.httpStatus
            equal: 400

  - id: emptyKey
    name: "Empty header value — degrades to no-key behavior"
    description: >
      An empty Idempotency-Key value is treated as if the header was
      absent. Mutation runs normally; PickingOrder allows duplicates
      per customer so a fixed customerID is fine.
    operation: picking.createPickingOrder
    headers:
      Idempotency-Key: ""
    vars:
      input:
        customerID: "00000000-0000-0000-0000-000000000001"
    tests:
      - msg: "Status is 200"
        assertions:
          - ref: res.status
            equal: 200
      - msg: "No idempotency error"
        assertions:
          - ref: res.body.errors
            nil: true
      - msg: "Fresh PickingOrder created (no replay)"
        assertions:
          - ref: res.body.data.createPickingOrder.pickingOrder.id
            nil: false

  - id: whitespaceKey
    name: "Whitespace-only header value — degrades to no-key behavior"
    description: >
      Whitespace-only header is trimmed and treated as absent.
    operation: picking.createPickingOrder
    headers:
      Idempotency-Key: "   "
    vars:
      input:
        customerID: "00000000-0000-0000-0000-000000000001"
    tests:
      - msg: "Status is 200"
        assertions:
          - ref: res.status
            equal: 200
      - msg: "No idempotency error"
        assertions:
          - ref: res.body.errors
            nil: true
      - msg: "Fresh PickingOrder created (no replay)"
        assertions:
          - ref: res.body.data.createPickingOrder.pickingOrder.id
            nil: false

  - id: maxLengthKey
    name: "255-char key — exact maximum is accepted"
    description: >
      Positive boundary: collection hook pads
      {{bru_idem_picking_max}} to 255 chars per run.
    operation: picking.createPickingOrder
    headers:
      Idempotency-Key: "{{bru_idem_picking_max}}"
    vars:
      input:
        customerID: "00000000-0000-0000-0000-000000000001"
    tests:
      - msg: "Status is 200"
        assertions:
          - ref: res.status
            equal: 200
      - msg: "No idempotency error"
        assertions:
          - ref: res.body.errors
            nil: true
      - msg: "PickingOrder created at max-length boundary"
        assertions:
          - ref: res.body.data.createPickingOrder.pickingOrder.id
            nil: false
