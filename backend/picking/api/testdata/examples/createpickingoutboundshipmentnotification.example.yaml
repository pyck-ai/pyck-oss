---
operation: CreatePickingOutboundShipmentNotification
name: "Create Picking Outbound Shipment Notification"
description: >
  Creates an outbound shipment notification linked to an existing order.
vars:
  input:
    orderID: { $placeholder: "order ID" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Notification was created"
    assertions:
      - ref: res.body.data.createPickingOutboundShipmentNotification.pickingOutboundShipmentNotification.id
        nil: false
      - ref: res.body.data.createPickingOutboundShipmentNotification.pickingOutboundShipmentNotification.orderID
        nil: false
