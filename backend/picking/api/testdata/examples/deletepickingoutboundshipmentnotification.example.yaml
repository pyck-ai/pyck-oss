---
operation: DeletePickingOutboundShipmentNotification
name: "Delete Picking Outbound Shipment Notification"
description: >
  Soft-deletes an outbound shipment notification by ID.
vars:
  id: { $placeholder: "notification ID" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Deleted ID returned"
    assertions:
      - ref: res.body.data.deletePickingOutboundShipmentNotification.deletedID
        equal: {$ref: req.body.variables.id}
