type Mutation {
  # The input and the output are types generated by Ent.
  createPickingOrder(input: CreatePickingOrderWithItemsInput!): PickingOrderOutput
  updatePickingOrder(id: ID!, input: UpdatePickingOrderInput!): PickingOrderOutput
  deletePickingOrder(id: ID!): PickingOrderDeletePayload!

  createPickingOrderItem(input: CreatePickingOrderItemInput!): PickingOrderItemOutput
  updatePickingOrderItem(id: ID!, input: UpdatePickingOrderItemInput!): PickingOrderItemOutput
  deletePickingOrderItem(id: ID!): PickingOrderItemDeletePayload!

  createPickingOutboundShipmentNotification(input: CreatePickingOutboundShipmentNotificationInput!): PickingOutboundShipmentNotificationOutput
  updatePickingOutboundShipmentNotification(id: ID!, input: UpdatePickingOutboundShipmentNotificationInput!): PickingOutboundShipmentNotificationOutput
  deletePickingOutboundShipmentNotification(id: ID!): PickingOutboundShipmentNotificationDeletePayload!
  """Apply RFC 6902 JSON Patch operations to the picking order's data field."""
  patchPickingOrderData(id: ID!, patches: [JSONPatchInput!]!): PickingOrderOutput
  """Apply RFC 6902 JSON Patch operations to the picking order item's data field."""
  patchPickingOrderItemData(id: ID!, patches: [JSONPatchInput!]!): PickingOrderItemOutput
  """Apply RFC 6902 JSON Patch operations to the picking outbound shipment notification's data field."""
  patchPickingOutboundShipmentNotificationData(id: ID!, patches: [JSONPatchInput!]!): PickingOutboundShipmentNotificationOutput
}

input CreatePickingOrderItemsInput {
  dataTypeID: UUID
  dataTypeSlug: String
  data: Map
  sku: String!
  quantity: Int!
}

input CreatePickingOrderWithItemsInput {
  dataTypeID: UUID
  dataTypeSlug: String
  data: Map
  customerID: UUID
  orderItems: [CreatePickingOrderItemsInput]
}

scalar UUID

type PickingOrderDeletePayload {
  deletedID: ID
  workflows: [TemporalWorkflow]
}

type PickingOrderItemDeletePayload {
  deletedID: ID
  workflows: [TemporalWorkflow]
}

type PickingOutboundShipmentNotificationOutput {
  pickingOutboundShipmentNotification: PickingOutboundShipmentNotification
  workflows: [TemporalWorkflow]
}

type PickingOutboundShipmentNotificationDeletePayload {
  deletedID: ID
  workflows: [TemporalWorkflow]
}

