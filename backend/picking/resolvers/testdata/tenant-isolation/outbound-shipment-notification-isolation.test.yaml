name: outbound-shipment-notification-isolation
description: Verify outbound shipment notifications are isolated between tenants

seed:
  tenants:
    - name: alpha
    - name: beta

  orders:
    - name: order-alpha
      tenant: alpha
    - name: order-beta
      tenant: beta

  outboundShipmentNotifications:
    - name: notif-alpha
      tenant: alpha
      order: order-alpha
    - name: notif-beta
      tenant: beta
      order: order-beta

checks:
  # --- Read isolation ---
  - type: query
    entity: outboundShipmentNotification
    tenant: alpha
    description: "alpha sees only own notifications"
    expectCount: 1

  - type: query
    entity: outboundShipmentNotification
    tenant: beta
    description: "beta sees only own notifications"
    expectCount: 1

  # --- Cross-tenant update + verify unchanged ---
  - type: cross-update
    entity: outboundShipmentNotification
    tenant: alpha
    target: beta/notif-beta
    description: "alpha cannot update beta's notification"
    expectError: "not found"

  - type: query
    entity: outboundShipmentNotification
    tenant: beta
    description: "beta still has 1 notification after failed cross-update"
    expectCount: 1

  # --- Cross-tenant delete + verify still exists ---
  - type: cross-delete
    entity: outboundShipmentNotification
    tenant: alpha
    target: beta/notif-beta
    description: "alpha cannot delete beta's notification"
    expectError: "not found"

  - type: query
    entity: outboundShipmentNotification
    tenant: beta
    description: "beta still has 1 notification after failed cross-delete"
    expectCount: 1

  # --- Cross-tenant create + verify no orphan ---
  - type: cross-create
    entity: outboundShipmentNotification
    tenant: alpha
    description: "alpha cannot create notification for beta's order"
    args:
      order: beta/order-beta
    expectError: "invalid order"

  - type: query
    entity: outboundShipmentNotification
    tenant: alpha
    description: "alpha still has 1 notification after failed cross-create"
    expectCount: 1

  # --- Cross-tenant update with orderID reassignment ---
  - type: cross-update-with-args
    entity: outboundShipmentNotification
    tenant: alpha
    target: alpha/notif-alpha
    description: "alpha cannot reassign own notification to beta's order"
    args:
      orderID: beta/order-beta
    expectError: "invalid order"
