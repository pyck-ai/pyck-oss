type Mutation {
  # The input and the output are types generated by Ent.
  createInventoryItem(input: CreateInventoryItemInput!): InventoryItemOutput
  updateInventoryItem(id: ID!, input: UpdateInventoryItemInput!): InventoryItemOutput
  deleteInventoryItem(id: ID!): InventoryItemDeletePayload!

  createInventoryRepository(input: CreateRepositoryInput!): InventoryRepositoryOutput
  updateInventoryRepository(id: ID!, input: UpdateRepositoryInput!): InventoryRepositoryOutput
  deleteInventoryRepository(id: ID!): InventoryRepositoryDeletePayload!

  createInventoryItemMovement(input: CreateItemMovementInput!): InventoryItemMovementOutput
  updateInventoryItemMovement(id: ID!, input: UpdateItemMovementInput!): InventoryItemMovementOutput
  executeInventoryItemMovement(id: ID!): InventoryItemMovementOutput
  deleteInventoryItemMovement(id: ID!): InventoryItemMovementDeletePayload!

  createInventoryRepositoryMovement(input: CreateRepositoryMovementInput!): InventoryRepositoryMovementOutput
  updateInventoryRepositoryMovement(id: ID!, input: UpdateRepositoryMovementInput!): InventoryRepositoryMovementOutput
  executeInventoryRepositoryMovement(id: ID!): InventoryRepositoryMovementOutput
  deleteInventoryRepositoryMovement(id: ID!): InventoryRepositoryMovementDeletePayload!

  createInventoryCollectionMovement(input: CreateCollectionMovementInput!): CreateCollectionMovementOutput
  updateInventoryCollectionMovement(id: ID!, input: UpdateInventoryCollectionInput!): UpdateCollectionMovementOutput
  deleteInventoryCollection(id: ID!): InventoryCollectionDeletePayload!

  deleteInventoryStock(input: ClearVirtualStockInput!): RepositoryDeletePayload

  rebuildInventoryStock: RebuildStockOutput

  createInventoryItemSet(input: CreateInventoryItemSetInput!): InventoryItemSetOutput
  updateInventoryItemSet(id: ID!, input: UpdateInventoryItemSetInput!): InventoryItemSetOutput
  deleteInventoryItemSet(id: ID!): InventoryItemSetDeletePayload!

  createReplenishmentOrder(input: CreateReplenishmentOrderWithItemsInput!): ReplenishmentOrderOutput
  updateReplenishmentOrder(id: ID!, input: UpdateReplenishmentOrderInput!): ReplenishmentOrderOutput
  deleteReplenishmentOrder(id: ID!): ReplenishmentOrderDeletePayload!

  createReplenishmentOrderItem(input: CreateReplenishmentOrderItemInput!): ReplenishmentOrderItemOutput
  updateReplenishmentOrderItem(id: ID!, input: UpdateReplenishmentOrderItemInput!): ReplenishmentOrderItemOutput
  deleteReplenishmentOrderItem(id: ID!): ReplenishmentOrderItemDeletePayload!
}

input CreateReplenishmentOrderItemsInput {
    dataTypeID: UUID
    dataTypeSlug: String
    data: Map
    sku: String!
    quantity: Int!
}

input CreateReplenishmentOrderWithItemsInput {
    dataTypeID: UUID
    dataTypeSlug: String
    data: Map
    supplierID: UUID
    items: [CreateReplenishmentOrderItemsInput]
}

scalar UUID

type InventoryItemDeletePayload {
  deletedID: ID
  workflows: [TemporalWorkflow]
}

type InventoryRepositoryDeletePayload {
  deletedID: ID
  workflows: [TemporalWorkflow]
}

type InventoryItemMovementDeletePayload {
  deletedID: ID
  workflows: [TemporalWorkflow]
}

type InventoryRepositoryMovementDeletePayload {
  deletedID: ID
  workflows: [TemporalWorkflow]
}

type InventoryItemSetDeletePayload {
  deletedID: ID
  workflows: [TemporalWorkflow]
}

type ReplenishmentOrderDeletePayload {
  deletedID: ID
  workflows: [TemporalWorkflow]
}

type ReplenishmentOrderItemDeletePayload {
  deletedID: ID
  workflows: [TemporalWorkflow]
}

type InventoryCollectionDeletePayload {
  deletedID: ID
  workflows: [TemporalWorkflow]
}
