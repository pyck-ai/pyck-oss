---
operation: PatchReplenishmentOrderItemData
name: "Patch Replenishment Order Item Data"
description: >
  Applies RFC 6902 JSON Patch operations to the replenishment order item's
  data field. Only changed fields are modified; untouched fields are preserved.
vars:
  id: { $placeholder: "replenishment order item id to patch" }
  patches:
    - op: REPLACE
      path: "/received"
      value: "true"
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Patched order item returned"
    assertions:
      - ref: res.body.data.patchReplenishmentOrderItemData.replenishmentOrderItem
        nil: false
      - ref: res.body.data.patchReplenishmentOrderItemData.replenishmentOrderItem.id
        equal: {$ref: req.body.variables.id}
