---
operation: UpdateInventoryItemMovement
name: "Update Inventory Item Movement"
description: >
  Updates a pending inventory item movement. Only non-immutable fields
  (handler, blockedBy) can be changed after creation. Executed movements
  cannot be updated or deleted.
vars:
  id: {$placeholder: "item movement ID"}
  input:
    handler: "operator-updated"
    blockedBy: {$placeholder: "movement ID that blocks this one (optional)"}
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Item movement updated"
    assertions:
      - ref: res.body.data.updateInventoryItemMovement.inventoryItemMovement
        nil: false
      - ref: res.body.data.updateInventoryItemMovement.inventoryItemMovement.id
        nil: false
      - ref: res.body.data.updateInventoryItemMovement.inventoryItemMovement.handler
        equal: "operator-updated"
