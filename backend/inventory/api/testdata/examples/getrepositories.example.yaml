---
operation: GetRepositories
name: "Get Repositories"
description: >
  Returns the 3 most recently created inventory repositories, sorted by name.
vars:
  first: 3
  orderBy:
    field: NAME
    direction: ASC
  where:
    createdAtGTE: "2023-10-17T00:00:00Z"
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Result set returned"
    assertions:
      - ref: res.body.data.repositories.totalCount
        nil: false
