---
operation: DeleteInventoryRepository
name: "Delete Inventory Repository"
description: >
  Soft-deletes an inventory repository by ID.
vars:
  id: {$placeholder: "repository ID"}
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Deleted ID returned"
    assertions:
      - ref: res.body.data.deleteInventoryRepository.deletedID
        equal: {$ref: req.body.variables.id}
