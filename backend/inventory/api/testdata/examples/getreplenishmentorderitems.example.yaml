---
operation: GetReplenishmentOrderItems
name: "Get Replenishment Order Items"
description: >
  Returns the 3 most recently created replenishment order items, sorted by SKU.
vars:
  first: 3
  orderBy:
    field: SKU
    direction: ASC
  where:
    createdAtGTE: "2023-10-17T00:00:00Z"
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Result set returned"
    assertions:
      - ref: res.body.data.replenishmentOrderItems.totalCount
        nil: false
