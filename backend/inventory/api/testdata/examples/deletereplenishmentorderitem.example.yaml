---
operation: DeleteReplenishmentOrderItem
name: "Delete Replenishment Order Item"
description: >
  Soft-deletes a replenishment order item by ID.
vars:
  id: {$placeholder: "replenishment order item ID"}
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Deleted ID returned"
    assertions:
      - ref: res.body.data.deleteReplenishmentOrderItem.deletedID
        equal: {$ref: req.body.variables.id}
