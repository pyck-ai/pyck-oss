---
operation: PatchInventoryRepositoryData
name: "Patch Inventory Repository Data"
description: >
  Applies RFC 6902 JSON Patch operations to the repository's data field.
  Only changed fields are modified; untouched fields are preserved.
vars:
  id: { $placeholder: "repository id to patch" }
  patches:
    - op: REPLACE
      path: "/capacity"
      value: "500"
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Patched repository returned"
    assertions:
      - ref: res.body.data.patchInventoryRepositoryData.inventoryRepository
        nil: false
      - ref: res.body.data.patchInventoryRepositoryData.inventoryRepository.id
        equal: {$ref: req.body.variables.id}
