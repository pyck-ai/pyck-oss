---
operation: DeleteInventoryItem
name: "Delete Inventory Item"
description: >
  Soft-deletes an inventory item by ID.
vars:
  id: { $placeholder: "item id to delete" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Deleted ID returned"
    assertions:
      - ref: res.body.data.deleteInventoryItem.deletedID
        equal: {$ref: req.body.variables.id}
