---
operation: GetStockTree
name: "Get Stock Tree"
description: >
  Returns the first 3 stock entries as a hierarchical tree,
  showing stock levels per repository including child repositories.
vars:
  first: 3
  where:
    createdAtGTE: "2023-10-17T00:00:00Z"
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Result set returned"
    assertions:
      - ref: res.body.data.getStockTree.totalCount
        nil: false
