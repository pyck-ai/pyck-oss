---
name: "User - Repository Unicode Encoding"
description: "Demonstrates the NFC vs NFD Unicode encoding on the .name field — create with NFC, query with NFD returns zero rows."
steps:
  - id: createNFC
    name: Create Repository with NFC Unicode name
    operation: inventory.createInventoryRepository
    vars:
      input:
        name: "Caf\u00E9 M\u00FCnchner"
        type: static
    tests:
      - msg: Status is 200
        assertions:
          - ref: res.status
            equal: 200
      - msg: No GraphQL errors
        assertions:
          - ref: res.body.errors
            nil: true
      - msg: Repository was created
        assertions:
          - ref: res.body.data.createInventoryRepository.inventoryRepository.id
            notNil: true

  - name: Query by NFC name — control case, must find
    operation: inventory.getRepositories
    vars:
      where:
        name: "Caf\u00E9 M\u00FCnchner"
    tests:
      - msg: Status is 200
        assertions:
          - ref: res.status
            equal: 200
      - msg: NFC query finds the row
        assertions:
          - ref: res.body.data.repositories.totalCount
            equal: 1

  - name: Query by NFD name — now matches NFC-stored row
    operation: inventory.getRepositories
    vars:
      where:
        name: "Cafe\u0301 Mu\u0308nchner"
    tests:
      - msg: Status is 200
        assertions:
          - ref: res.status
            equal: 200
      - msg: "NFD-encoded query now matches NFC-stored row"
        assertions:
          - ref: res.body.data.repositories.totalCount
            equal: 1

  - name: Cleanup — delete the repository
    operation: inventory.deleteInventoryRepository
    vars:
      id: {$ref: "res[createNFC].body.data.createInventoryRepository.inventoryRepository.id"}
    tests:
      - msg: Status is 200
        assertions:
          - ref: res.status
            equal: 200
