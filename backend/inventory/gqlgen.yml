# gqlgen configuration file
# see https://gqlgen.com/config/

schema:
  - graph/*.graphql

exec:
  filename: gqlgen_gen.go

federation:
  filename: gqlgen_federation_gen.go
  version: 2

model:
  filename: model/gqlgen_gen.go
  package: model

resolver:
  layout: follow-schema
  dir: resolvers
  package: resolvers
  filename_template: "{name}.resolvers.go"

# @pyckImportable is used at code generation time by importgen, not at runtime.
directives:
  pyckImportable:
    skip_runtime: true

omit_gqlgen_version_in_file_notice: true

skip_validation: false

skip_mod_tidy: false

# autobind tells gqlgen to search for any type names in the GraphQL schema in the
# provided package. If they match it will use them, otherwise it will generate new.
autobind:
  - github.com/99designs/gqlgen/graphql/introspection
  - github.com/pyck-ai/pyck/backend/inventory/ent/gen
  - github.com/pyck-ai/pyck/backend/inventory/ent/gen/collection_movement
  - github.com/pyck-ai/pyck/backend/inventory/ent/gen/item
  - github.com/pyck-ai/pyck/backend/inventory/ent/gen/itemmovement
  - github.com/pyck-ai/pyck/backend/inventory/ent/gen/itemset
  - github.com/pyck-ai/pyck/backend/inventory/ent/gen/replenishmentorder
  - github.com/pyck-ai/pyck/backend/inventory/ent/gen/replenishmentorderitem
  - github.com/pyck-ai/pyck/backend/inventory/ent/gen/repository
  - github.com/pyck-ai/pyck/backend/inventory/ent/gen/stock
  - github.com/pyck-ai/pyck/backend/inventory/ent/gen/transaction

# This section declares type mapping between the GraphQL and Go type systems.
models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.UUID
  UUID:
    model:
      - github.com/99designs/gqlgen/graphql.UUID
  Map:
    model:
      - github.com/99designs/gqlgen/graphql.Map
  JSONPatchOp:
    model:
      - github.com/pyck-ai/pyck/backend/common/jsonpatch.JSONPatchOp
  JSONPatchInput:
    model:
      - github.com/pyck-ai/pyck/backend/common/jsonpatch.JSONPatchInput
  Node:
    model:
      - github.com/pyck-ai/pyck/backend/inventory/ent/gen.Noder
