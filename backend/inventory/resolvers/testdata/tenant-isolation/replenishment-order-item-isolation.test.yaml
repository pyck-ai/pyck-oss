name: replenishment-order-item-isolation
description: Verify replenishment order items are isolated between tenants

seed:
  tenants:
    - name: alpha
    - name: beta

  replenishmentOrders:
    - name: order-alpha
      tenant: alpha
    - name: order-beta
      tenant: beta

  replenishmentOrderItems:
    - name: roi-alpha
      tenant: alpha
      order: order-alpha
      sku: BOLT-100
      quantity: 50
    - name: roi-beta
      tenant: beta
      order: order-beta
      sku: BOLT-200
      quantity: 30

checks:
  # --- Read isolation ---
  - type: query
    entity: replenishmentOrderItem
    tenant: alpha
    description: "alpha sees only own replenishment order items"
    expectCount: 1

  - type: query
    entity: replenishmentOrderItem
    tenant: beta
    description: "beta sees only own replenishment order items"
    expectCount: 1

  # --- Cross-tenant update + verify unchanged ---
  - type: cross-update
    entity: replenishmentOrderItem
    tenant: alpha
    target: beta/roi-beta
    description: "alpha cannot update beta's replenishment order item"
    expectError: "not found"

  - type: query
    entity: replenishmentOrderItem
    tenant: beta
    description: "beta still has 1 replenishment order item after failed cross-update"
    expectCount: 1

  # --- Cross-tenant delete + verify still exists ---
  - type: cross-delete
    entity: replenishmentOrderItem
    tenant: alpha
    target: beta/roi-beta
    description: "alpha cannot delete beta's replenishment order item"
    expectError: "not found"

  - type: query
    entity: replenishmentOrderItem
    tenant: beta
    description: "beta still has 1 replenishment order item after failed cross-delete"
    expectCount: 1

  # --- Cross-tenant create + verify no orphan ---
  - type: cross-create
    entity: replenishmentOrderItem
    tenant: alpha
    description: "alpha cannot create item in beta's replenishment order"
    args:
      order: beta/order-beta
      sku: CROSS-TENANT-BOLT
      quantity: 99
    expectError: "not found"

  - type: query
    entity: replenishmentOrderItem
    tenant: alpha
    description: "alpha still has 1 replenishment order item after failed cross-create"
    expectCount: 1
