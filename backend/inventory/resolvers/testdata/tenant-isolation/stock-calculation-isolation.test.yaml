name: stock-calculation-isolation
description: Verify stock calculations from executed movements are isolated between tenants

seed:
  tenants:
    - name: alpha
    - name: beta

  repositories:
    - name: virtual
      tenant: alpha
      type: static
      virtual: true
    - name: warehouse
      tenant: alpha
      type: static
    - name: virtual
      tenant: beta
      type: static
      virtual: true
    - name: warehouse
      tenant: beta
      type: static

  items:
    - sku: WIDGET-A
      tenant: alpha
    - sku: WIDGET-A
      tenant: beta

  itemMovements:
    - name: alpha-stock-in
      tenant: alpha
      item: WIDGET-A
      from: virtual
      to: warehouse
      quantity: 100
      handler: test-handler
    - name: beta-stock-in
      tenant: beta
      item: WIDGET-A
      from: virtual
      to: warehouse
      quantity: 25
      handler: test-handler

  # Execute movements via GraphQL mutation to trigger stock calculation
  executeMovements:
    - tenant: alpha
      movement: alpha-stock-in
    - tenant: beta
      movement: beta-stock-in

checks:
  # Stock query isolation: alpha should only see own stock levels
  - type: query-stock
    tenant: alpha
    repository: alpha/warehouse
    item: alpha/WIDGET-A
    description: "alpha warehouse has 100 stock (not contaminated by beta)"
    expectQuantity: 100

  - type: query-stock
    tenant: beta
    repository: beta/warehouse
    item: beta/WIDGET-A
    description: "beta warehouse has 25 stock (not contaminated by alpha)"
    expectQuantity: 25

  # Stock list isolation
  - type: query
    entity: stock
    tenant: alpha
    description: "alpha sees only own stock records"
    expectCount: 2

  - type: query
    entity: stock
    tenant: beta
    description: "beta sees only own stock records"
    expectCount: 2

  # Transaction isolation (generated by executed movements)
  - type: query
    entity: transaction
    tenant: alpha
    description: "alpha sees only own transactions"
    expectCount: 2

  - type: query
    entity: transaction
    tenant: beta
    description: "beta sees only own transactions"
    expectCount: 2
