# Own Quantity Survives Many Soft-Deleted Pending Picks
# Reproduces issue-stock-map-resets-own-quantity-to-zero-on-pending-pick-creation.md
#
# Scenario:
# 1. Seed: place 14 items at slot (virtual -> slot, qty=14, executed).
# 2. 50 create-then-delete cycles of a small pending pick from slot,
#    matching the live count "1 pending + 50 soft-deleted" the issue
#    reports for the production tenant.
# 3. After all cycles, create one more pending pick (the "real" one)
#    and execute it. own_quantity on the slot must drop from 14 -> 13,
#    NOT 14 -> 0 -> underflow.
#
# Result: this test PASSES. The Go orchestration path
# (createItemMovementViaGo + simulateRepositoryStockMap + insertStockMap)
# correctly preserves own_quantity through the entire cycle batch.
# Hypothesis 3 in the issue (deleted_at vs spurious executed_at affecting
# the live projection) is therefore refuted - no live mutation path
# iterates item_movements to read other movements' executed_at.
#
# The actual production bug is in the Postgres create_item_movement_proc
# (not exercised by this SQLite-backed test). The proc's tmp_stock_deltas
# baseline is built ONCE before the OCC retry LOOP. On a unique_violation
# retry of the version index, the INSERT recomputes MAX(version)+1
# dynamically but reuses the FROZEN own_quantity baseline. Validated by a
# concurrent race against a disposable Postgres + port of the proc:
# slow proc captures baseline=row_v0 (own_quantity=0), a fast EXECUTE
# commits row_v1 (own_quantity=14), slow proc wakes, INSERT collides,
# retries -> lands at version=2 with own_quantity=0 and created_at < T_fast.
# Subsequent CREATE proc calls then read version=2 as baseline (the proc
# uses ORDER BY version DESC) and persist new rows with own_quantity=0,
# matching the production buggy snapshot exactly (version=290,
# own_quantity=0, own_incoming_stock=154, own_outgoing_stock>=1).
# After that any execute underflows on the FROM walk: 0 + (-1) = -1.
#
# Fix surface: production proc should refresh its baseline read inside
# the retry block (or order the baseline LATERAL by created_at DESC, to
# match the Go path and the proc's own availability check).
name: own-quantity-survives-many-soft-deleted-pending-picks
itemSKU: own-qty-collapse-test-item

# ========================================================================
# REPOSITORY STRUCTURE OVERVIEW
# ========================================================================
#
#  virtual (virtual, root)
#
#  warehouse (root)
#  ├─ slot
#  └─ box
#
# ========================================================================

repositories:
  # Virtual repository for the initial stock placement (mimics WF050).
  - name: virtual
    parent: ""
    type: static
    virtual: true

  # Root warehouse — common ancestor of slot and box.
  - name: warehouse
    parent: ""
    type: static
    virtual: false

  # The test slot that mirrors production "1-510-B-10h":
  # holds the 14 placed units, source of every pending pick below.
  - name: slot
    parent: warehouse
    type: static
    virtual: false

  # Target box for the pending picks — reused across all cycles.
  - name: box
    parent: warehouse
    type: static
    virtual: false

steps:
  # =========================================================================
  # Seed: place 14 items at slot (mimics WF050 placement).
  #
  #  virtual                             warehouse
  #    └─[14 items]────────────────────► └─ slot
  # =========================================================================
  - name: seed_create
    action: create
    moveType: item
    from: virtual
    to: slot
    qty: 14
    expectedStocks:
      virtual:   { qty:   0, ownQty:   0, in:   0, ownIn:   0, out: 14, ownOut: 14 }
      warehouse: { qty:   0, ownQty:   0, in:  14, ownIn:   0, out:   0, ownOut:   0 }
      slot:      { qty:   0, ownQty:   0, in:  14, ownIn:  14, out:   0, ownOut:   0 }
      box:       { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  - name: seed_execute
    action: execute
    movement: seed_create
    expectedStocks:
      virtual:   { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse: { qty:  14, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
