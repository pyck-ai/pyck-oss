      box:       { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  # =========================================================================
  # Create-then-delete cycles: 50 pending picks of qty=1 slot -> box.
  # Each cycle leaves a soft-deleted item_movement and 2x stocks rows behind.
  # After every cycle the slot must still read qty=14, ownQty=14.
