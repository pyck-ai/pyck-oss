  # =========================================================================
  # =========================================================================
  #  warehouse
  #  ├─ slot ──[1 items]─╮
  #  └─ box  ◄──────────╯
  # =========================================================================
  - name: final_create
    action: create
    moveType: item
    from: slot
    to: box
    qty: 1
    expectedStocks:
      slot:      { qty:  14, ownQty:  14, in:   0, ownIn:   0, out:   1, ownOut:   1 }
      box:       { qty:   0, ownQty:   0, in:   1, ownIn:   1, out:   0, ownOut:   0 }
      warehouse: { qty:  14, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  # =========================================================================
  # Final execute: should drop slot.ownQty from 14 -> 13,
  # NOT explode with "stock underflow: quantity would be -1".
  # =========================================================================
  - name: final_execute
    action: execute
    movement: final_create
    expectedStocks:
      slot:      { qty:  13, ownQty:  13, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      box:       { qty:   1, ownQty:   1, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse: { qty:  14, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
