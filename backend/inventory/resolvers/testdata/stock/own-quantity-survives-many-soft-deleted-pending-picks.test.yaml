    action: create
    moveType: item
    from: slot
    to: box
    qty: 1
    expectedStocks:
      slot:      { qty:  14, ownQty:  14, in:   0, ownIn:   0, out:   1, ownOut:   1 }
      box:       { qty:   0, ownQty:   0, in:   1, ownIn:   1, out:   0, ownOut:   0 }
