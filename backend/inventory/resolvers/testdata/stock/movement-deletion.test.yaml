# Movement Deletion Scenario
# Tests that deleting pending movements correctly reverses stock reservations
# for both item and repository movements
name: movement-deletion
itemSKU: deletion-test-item

# ========================================================================
# REPOSITORY STRUCTURE OVERVIEW
# ========================================================================
#
#  warehouse (root)
#  ├─ storage
#  │  └─ shelf
#  └─ outbound
#
# ========================================================================

repositories:
  # Virtual repository for initial stock additions
  - name: virtual
    parent: ""
    type: static
    virtual: true

  # Main warehouse container
  - name: warehouse
    parent: ""
    type: static
    virtual: false

  # Storage area containing shelf
  - name: storage
    parent: warehouse
    type: static
    virtual: false

  # Shelf - holds stock, target of seed movement
  - name: shelf
    parent: storage
    type: static
    virtual: false

  # Outbound - destination for item movements
  - name: outbound
    parent: warehouse
    type: static
    virtual: false

steps:
  # =========================================================================
  #  virtual                             warehouse
  #  │                                   └─ storage
  #  └─[100 items]────────────────────────► └─ shelf
  # =========================================================================
  - name: create_item_virtual_to_shelf
    action: create
    moveType: item
    from: virtual
    to: shelf
    qty: 100
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out: 100, ownOut: 100 }
      warehouse:  { qty:   0, ownQty:   0, in: 100, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty:   0, ownQty:   0, in: 100, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty:   0, ownQty:   0, in: 100, ownIn: 100, out:   0, ownOut:   0 }
      outbound:   { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  - name: execute_item_virtual_to_shelf
    action: execute
    movement: create_item_virtual_to_shelf
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty: 100, ownQty: 100, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      outbound:   { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  # =========================================================================
  # TEST 1: Create and delete pending item movement
  # =========================================================================

  # =========================================================================
  #  warehouse
  #  ├─ storage
  #  │  └─ shelf ──[20 items]────╮
  #  └─ outbound ◄───────────────╯
  # =========================================================================
  - name: create_item_shelf_to_outbound
    action: create
    moveType: item
    from: shelf
    to: outbound
    qty: 20
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:  20, ownOut:   0 }
      shelf:      { qty: 100, ownQty: 100, in:   0, ownIn:   0, out:  20, ownOut:  20 }
      outbound:   { qty:   0, ownQty:   0, in:  20, ownIn:  20, out:   0, ownOut:   0 }

  # =========================================================================
  #  warehouse
  #  ├─ storage
  #  │  └─ shelf ──[20 items]─╳ (delete movement)
  #  └─ outbound ◄────────────╯
  # =========================================================================
  - name: delete_item_shelf_to_outbound
    action: delete
    movement: create_item_shelf_to_outbound
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty: 100, ownQty: 100, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      outbound:   { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  # =========================================================================
  # TEST 2: Create and delete pending repository movement
  # =========================================================================

  # =========================================================================
  #  warehouse
  #  ├─ storage
  #  │  └─ shelf ────[repo]─╮
  #  ├─ ▒▒▒▒▒▒▒▒ ◄──────────╯
  #  └─ outbound
  # =========================================================================
  - name: create_repo_shelf_to_warehouse
    action: create
    moveType: repository
    from: shelf
    to: warehouse
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty: 100, ownQty:   0, in:   0, ownIn:   0, out: 100, ownOut:   0 }
      shelf:      { qty: 100, ownQty: 100, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      outbound:   { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  - name: delete_repo_shelf_to_warehouse
    action: delete
    movement: create_repo_shelf_to_warehouse
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty: 100, ownQty: 100, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      outbound:   { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  # =========================================================================
  # TEST 3: Verify stock still works after deletions (create + execute)
  # =========================================================================

  # =========================================================================
  #  warehouse
  #  ├─ storage
  #  │  └─ shelf ──[10 items]────╮
  #  └─ outbound ◄───────────────╯
  # =========================================================================
  - name: create_item_shelf_to_outbound_second
    action: create
    moveType: item
    from: shelf
    to: outbound
    qty: 10
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:  10, ownOut:   0 }
      shelf:      { qty: 100, ownQty: 100, in:   0, ownIn:   0, out:  10, ownOut:  10 }
      outbound:   { qty:   0, ownQty:   0, in:  10, ownIn:  10, out:   0, ownOut:   0 }

  - name: execute_item_shelf_to_outbound_second
    action: execute
    movement: create_item_shelf_to_outbound_second
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty:  90, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty:  90, ownQty:  90, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      outbound:   { qty:  10, ownQty:  10, in:   0, ownIn:   0, out:   0, ownOut:   0 }
