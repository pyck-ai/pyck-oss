# Executed Movement Deletion Scenario
# Tests that:
# 1. Deleting an executed movement fails for item, repository, and collection movements
# 2. Deleting a non-executed movement succeeds and reverses stock reservations
# 3. Stock levels remain correct throughout all operations
name: executed-movement-deletion
itemSKU: exec-del-test-item

# ========================================================================
# REPOSITORY STRUCTURE OVERVIEW
# ========================================================================
#
#  warehouse (root)
#  ├─ storage
#  │  └─ shelf
#  └─ outbound
#
# ========================================================================

repositories:
  # Virtual repository for initial stock additions
  - name: virtual
    parent: ""
    type: static
    virtual: true

  # Main warehouse container
  - name: warehouse
    parent: ""
    type: static
    virtual: false

  # Storage area - initial parent of shelf
  - name: storage
    parent: warehouse
    type: static
    virtual: false

  # Shelf - holds initial stock, moves between parents
  - name: shelf
    parent: storage
    type: static
    virtual: false

  # Outbound - destination for item/collection movements
  - name: outbound
    parent: warehouse
    type: static
    virtual: false

steps:
  # =========================================================================
  #  virtual                             warehouse
  #  │                                   └─ storage
  #  └─[100 items]────────────────────────► └─ shelf
  # =========================================================================
  - name: setup_create_item_virtual_to_shelf
    action: create
    moveType: item
    from: virtual
    to: shelf
    qty: 100
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out: 100, ownOut: 100 }
      warehouse:  { qty:   0, ownQty:   0, in: 100, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty:   0, ownQty:   0, in: 100, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty:   0, ownQty:   0, in: 100, ownIn: 100, out:   0, ownOut:   0 }
      outbound:   { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  - name: setup_execute_item_virtual_to_shelf
    action: execute
    movement: setup_create_item_virtual_to_shelf
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty: 100, ownQty: 100, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      outbound:   { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  # TEST 1: Delete executed item movement → should fail
  - name: delete_executed_item_movement
    action: delete
    movement: setup_create_item_virtual_to_shelf
    expectError: "cannot delete an executed movement"
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty: 100, ownQty: 100, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      outbound:   { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  # =========================================================================
  # TEST 2: Delete non-executed item movement → should succeed
  # =========================================================================

  # =========================================================================
  #  warehouse
  #  ├─ storage
  #  │  └─ shelf ──[30 items]────╮
  #  └─ outbound ◄───────────────╯
  # =========================================================================
  - name: create_item_shelf_to_outbound
    action: create
    moveType: item
    from: shelf
    to: outbound
    qty: 30
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:  30, ownOut:   0 }
      shelf:      { qty: 100, ownQty: 100, in:   0, ownIn:   0, out:  30, ownOut:  30 }
      outbound:   { qty:   0, ownQty:   0, in:  30, ownIn:  30, out:   0, ownOut:   0 }

  # =========================================================================
  #  warehouse
  #  ├─ storage
  #  │  └─ shelf ──[30 items]──╳ (delete movement)
  #  └─ outbound ◄─────────────╯
  # =========================================================================
  - name: delete_pending_item_movement
    action: delete
    movement: create_item_shelf_to_outbound
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty: 100, ownQty: 100, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      outbound:   { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  # =========================================================================
  # TEST 3: Delete executed repository movement → should fail
  # =========================================================================

  # =========================================================================
  #  warehouse
  #  ├─ storage
  #  │  └─ shelf ────[repo]─╮
  #  ├─ ▒▒▒▒▒▒▒▒ ◄──────────╯
  #  └─ outbound
  # =========================================================================
  - name: create_repo_shelf_to_warehouse
    action: create
    moveType: repository
    from: shelf
    to: warehouse
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty: 100, ownQty:   0, in:   0, ownIn:   0, out: 100, ownOut:   0 }
      shelf:      { qty: 100, ownQty: 100, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      outbound:   { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  - name: execute_repo_shelf_to_warehouse
    action: execute
    movement: create_repo_shelf_to_warehouse
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty: 100, ownQty: 100, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      outbound:   { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  # Try to delete the executed repository movement → should fail
  - name: delete_executed_repo_movement
    action: delete
    movement: create_repo_shelf_to_warehouse
    expectError: "cannot delete an executed movement"
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty: 100, ownQty: 100, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      outbound:   { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  # =========================================================================
  # TEST 4: Delete non-executed repository movement → should succeed
  # =========================================================================

  # =========================================================================
  #  warehouse
  #  ├─ storage
  #  ├─ shelf ────[repo]─╮
  #  └─ outbound         │
  #     └─ ▒▒▒▒▒▒▒▒ ◄────╯
  # =========================================================================
  - name: create_repo_shelf_to_outbound
    action: create
    moveType: repository
    from: shelf
    to: outbound
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty: 100, ownQty: 100, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      outbound:   { qty:   0, ownQty:   0, in: 100, ownIn:   0, out:   0, ownOut:   0 }

  - name: delete_pending_repo_movement
    action: delete
    movement: create_repo_shelf_to_outbound
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty: 100, ownQty: 100, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      outbound:   { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  # =========================================================================
  # TEST 5: Delete executed collection movement → should fail
  # =========================================================================

  - name: create_collection_shelf_to_outbound
    action: create
    moveType: collection
    collection:
      # =========================================================================
      #  warehouse
      #  ├─ storage
      #  ├─ shelf ──[25 items]─╮
      #  └─ outbound ◄─────────╯
      # =========================================================================
      - from: shelf
        to: outbound
        qty: 25
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty: 100, ownQty: 100, in:   0, ownIn:   0, out:  25, ownOut:  25 }
      outbound:   { qty:   0, ownQty:   0, in:  25, ownIn:  25, out:   0, ownOut:   0 }

  - name: execute_collection_shelf_to_outbound
    action: execute
    movement: create_collection_shelf_to_outbound[0]
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty:  75, ownQty:  75, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      outbound:   { qty:  25, ownQty:  25, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  # Try to delete the executed collection movement → should fail
  - name: delete_executed_collection_movement
    action: delete
    movement: create_collection_shelf_to_outbound[0]
    expectError: "cannot delete an executed movement"
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty:  75, ownQty:  75, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      outbound:   { qty:  25, ownQty:  25, in:   0, ownIn:   0, out:   0, ownOut:   0 }

  # =========================================================================
  # TEST 6: Delete non-executed collection movement → should succeed
  # =========================================================================

  - name: create_collection_shelf_to_outbound_pending
    action: create
    moveType: collection
    collection:
      # =========================================================================
      #  warehouse
      #  ├─ storage
      #  ├─ shelf ──[15 items]─╮
      #  └─ outbound ◄─────────╯
      # =========================================================================
      - from: shelf
        to: outbound
        qty: 15
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty:  75, ownQty:  75, in:   0, ownIn:   0, out:  15, ownOut:  15 }
      outbound:   { qty:  25, ownQty:  25, in:  15, ownIn:  15, out:   0, ownOut:   0 }

  # =========================================================================
  #  warehouse
  #  ├─ storage
  #  ├─ shelf ──[15 items]─╳ (delete movement)
  #  └─ outbound ◄─────────╯
  # =========================================================================
  - name: delete_pending_collection_movement
    action: delete
    movement: create_collection_shelf_to_outbound_pending[0]
    expectedStocks:
      virtual:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      warehouse:  { qty: 100, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      storage:    { qty:   0, ownQty:   0, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      shelf:      { qty:  75, ownQty:  75, in:   0, ownIn:   0, out:   0, ownOut:   0 }
      outbound:   { qty:  25, ownQty:  25, in:   0, ownIn:   0, out:   0, ownOut:   0 }
