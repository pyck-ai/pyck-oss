# ========================================================================
# MOVEMENT DEFINITIONS
# ========================================================================
movements:
  # Phase 1: Seed stock into box (item movement from virtual to box)
  - name: seed_box
    moveType: item
    from: virtual
    to: box
    qty: 100

  # Phase 2: Move box from inbound to deepest node in branch A (repository movement)
  - name: move_box_inbound_to_a50
    moveType: repository
    from: inbound
    to: branch_a_L50
    repoToMove: box

  # Phase 3: Move box from branch A to 3rd deepest node in branch B (repository movement)
  - name: move_box_a50_to_b48
    moveType: repository
    from: branch_a_L50
    to: branch_b_L48
    repoToMove: box

  # Phase 4: Move box from branch B to outbound (repository movement)
  - name: move_box_b48_to_outbound
    moveType: repository
    from: branch_b_L48
    to: outbound
    repoToMove: box

# ========================================================================
# TEST STEPS (Execute movements and verify stock levels)
# ========================================================================
steps:
  # ======== PHASE 1: SEED STOCK ========
  - name: seed_box
    action: create
    moveType: item
    from: virtual
    to: box
    qty: 100
    expectedStocks:
      inbound: { qty: 0, ownQty: 0, in: 100, ownIn: 0, out: 0, ownOut: 0 }

  - name: exec_seed_box
    action: execute
    movement: seed_box
    expectedStocks:
      root:    { qty: 100, ownQty: 0, in: 0, ownIn: 0, out: 0, ownOut: 0 }
      inbound: { qty: 100, ownQty: 0, in: 0, ownIn: 0, out: 0, ownOut: 0 }

