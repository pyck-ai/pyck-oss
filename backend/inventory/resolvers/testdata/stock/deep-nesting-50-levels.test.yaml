# Deep Nesting: 50-Level Repository Movement Test
# Tests repository movements through deeply nested hierarchies (50 levels).
# A "box" repository is moved: inbound → branch_a_L50 → branch_b_L48 → outbound
name: deep-nesting-50-levels
itemSKU: deep-nest-item-50

# ========================================================================
# REPOSITORY STRUCTURE OVERVIEW (50 LEVELS)
# ========================================================================
#
#  root (L0)
#  ├─ inbound (entry point for box)
#  ├─ outbound (exit point for box)
#  ├─ branch_a_L1
#  │  └─ ... (L2-L49)
#  │     └─ branch_a_L50 (deepest in branch A - box enters here)
#  └─ branch_b_L1
#     └─ ... (L2-L47)
#        └─ branch_b_L48 (3rd deepest in branch B - box moves here)
#           └─ branch_b_L49
#              └─ branch_b_L50
#
#  virtual (external - source of stock items)
#  box (dynamic repository - moves through tree)
#
# ========================================================================
# REPOSITORY DEFINITIONS (105 total)
# ========================================================================
repositories:
  # Virtual repo (for item source)
  - { name: virtual, type: static, virtual: true }

  # Root of the hierarchy
  - { name: root, type: static, virtual: false }

  # Inbound/Outbound repos (children of root)
  - { name: inbound, parent: root, type: static, virtual: false }
  - { name: outbound, parent: root, type: static, virtual: false }

