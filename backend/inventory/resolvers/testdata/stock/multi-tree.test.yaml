# Multi-Tree Deep Hierarchy Scenario
# Comprehensive test covering deep hierarchies, multiple trees, cross-tree movements,
# repository relocations, and collection movements
name: multi-tree
itemSKU: multi-item

# ========================================================================
# INITIAL REPOSITORY STRUCTURE OVERVIEW
# ========================================================================
#
#  A_warehouse (root)                           B_warehouse (root)
#  ├─ A1_storage                                ├─ B1_storage
#  │  ├─ A1_1_zone                              │  └─ B1_1_shelf
#  │  │  └─ A1_1_1_shelf (depth 4)              │
#  │  └─ A1_2_zone                              └─ outbound
#  │     └─ [pallet] (dynamic)
#  └─ A2_storage
#     └─ A2_1_shelf
#
# ========================================================================

repositories:
  # Virtual repository for initial stock additions
  - name: virtual
    parent: ""
    type: static
    virtual: true

  # ── Tree A: Deep hierarchy (4 levels) ──

  # Main warehouse A - root of Tree A
  - name: A_warehouse
    parent: ""
    type: static
    virtual: false

  # First storage area under A_warehouse
  - name: A1_storage
    parent: A_warehouse
    type: static
    virtual: false

  # First zone under A1_storage
  - name: A1_1_zone
    parent: A1_storage
    type: static
    virtual: false

  # Deepest shelf (depth 4) - holds initial stock
  - name: A1_1_1_shelf
    parent: A1_1_zone
    type: static
    virtual: false

  # Second zone under A1_storage - initial pallet parent
  - name: A1_2_zone
    parent: A1_storage
    type: static
    virtual: false

  # Dynamic pallet that will be relocated between trees
  - name: pallet
    parent: A1_2_zone
    type: dynamic
    virtual: false

  # Second storage area under A_warehouse
  - name: A2_storage
    parent: A_warehouse
    type: static
    virtual: false

  # Shelf under A2_storage - receives second seed
  - name: A2_1_shelf
    parent: A2_storage
    type: static
    virtual: false

  # ── Tree B: Separate warehouse tree ──

  # Main warehouse B - root of Tree B
  - name: B_warehouse
    parent: ""
    type: static
    virtual: false

  # Storage area under B_warehouse
  - name: B1_storage
    parent: B_warehouse
    type: static
    virtual: false

  # Shelf under B1_storage - cross-tree item destination
  - name: B1_1_shelf
    parent: B1_storage
    type: static
    virtual: false

  # Outbound area - cross-tree repo destination for pallet
  - name: outbound
    parent: B_warehouse
    type: static
    virtual: false

