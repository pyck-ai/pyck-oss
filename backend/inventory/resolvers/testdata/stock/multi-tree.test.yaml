      virtual:      { qty:   0, ownQty:   0, in:   0, ownIn:   0, out: 100, ownOut: 100 }

      A_warehouse:  { qty:   0, ownQty:   0, in: 100, ownIn:   0, out:   0, ownOut:   0 }
      A1_storage:   { qty:   0, ownQty:   0, in: 100, ownIn:   0, out:   0, ownOut:   0 }
      A1_1_zone:    { qty:   0, ownQty:   0, in: 100, ownIn:   0, out:   0, ownOut:   0 }
      A1_1_1_shelf: { qty:   0, ownQty:   0, in: 100, ownIn: 100, out:   0, ownOut:   0 }
