#sandbox:
#  enabled: true
#homepage:
#  enabled: false
supergraph:
  listen: 0.0.0.0:4000
  introspection: true
override_subgraph_url:
  items: http://main-data:8081/query
headers:
  all:
    request:
      - propagate:
          named: "Authorization"
      - propagate:
          named: "X-Pyck-Tenant-Id"
      - propagate:
          named: "X-Pyck-Feature"
telemetry:
  exporters:
    logging:
      stdout:
        enabled: true
        format: json
