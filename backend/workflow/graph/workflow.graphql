extend type Query {
  """
  List workflow executions with pagination support.
  Returns lightweight execution metadata without history.
  Use workflowHistory query to fetch history for specific executions.
  Pagination uses Temporal's NextPageToken directly.
  """
  workflowExecutions(
    """Filter criteria for workflow executions."""
    where: WorkflowExecutionsWhereInput
    """Maximum number of executions to return. Defaults to 100."""
    first: Int
    """Pagination cursor from previous response (NextPageToken from Temporal)."""
    after: String
    """Ordering options for the returned list."""
    orderBy: WorkflowExecutionOrder
  ): WorkflowExecutionInfoConnection!

  """
  List assignable workflow executions with pagination support.
  Shorthand for `workflowExecutions(where: {isAssignable: true})`.
  """
  assignableWorkflowExecutions(
    """Filter criteria for workflow executions."""
    where: WorkflowExecutionsWhereInput
    """Maximum number of executions to return. Defaults to 100."""
    first: Int
    """Pagination cursor from previous response."""
    after: String
    """Ordering options for the returned list."""
    orderBy: WorkflowExecutionOrder
  ): WorkflowExecutionInfoConnection! @deprecated(reason: "Use workflowExecutions(where: {isAssignable: true}) instead. This wrapper will be removed in a future release.")

  """
  Fetch workflow history for executions matching filter criteria.
  Use workflowID and runID filters for a specific execution,
  or other filters for batch retrieval across related workflows.
  Returns all history events (no pagination).
  """
  workflowHistory(
    """Filter criteria for workflow executions."""
    where: WorkflowExecutionsWhereInput!
    """Maximum number of executions to fetch history for. Defaults to 10, max 100."""
    limit: Int
  ): WorkflowExecutionHistoryConnection!
}

