"""
Information about a workflow execution.
History is not included in list responses for performance.
Use workflowHistory query to fetch history for specific executions.
"""
type WorkflowExecutionInfo {
    """The workflow execution identifier (workflowId and runId)."""
    execution: WorkflowExecution!
    """The workflow type."""
    type: WorkflowType!
    """The time when the workflow started."""
    startTime: String!
    """The time when the workflow completed (null if still running)."""
    closeTime: String
    """The current status of the workflow execution."""
    status: String!
    """The number of events in the workflow history."""
    historyLength: Int!
    """The parent namespace ID if this is a child workflow."""
    parentNamespaceId: String
    """The parent execution if this is a child workflow."""
    parentExecution: WorkflowExecution
    """The time when the workflow was scheduled to execute."""
    executionTime: String
    """Search attributes for querying workflows."""
    searchAttributes: [TemporalMetadata!]!
    """Auto reset points for the workflow."""
    autoResetPoints: Map
    """The task queue where the workflow is executed."""
    taskQueue: String!
    """The number of state transitions in the workflow."""
    stateTransitionCount: Int!
    """The size of the workflow history in bytes."""
    historySizeBytes: Int!
    """The version stamp of the most recent worker."""
    mostRecentWorkerVersionStamp: Map
    """The duration of the workflow execution."""
    executionDuration: String
    """The root execution if this is part of a workflow chain."""
    rootExecution: WorkflowExecution
}

"""
Workflow execution with its history.
Used for history retrieval via workflowHistory query.
"""
type WorkflowExecutionHistory {
    """The workflow execution identifier."""
    execution: WorkflowExecution!
    """The workflow type name."""
    typeName: String!
    """All history events for this execution."""
    history: [WorkflowEvent!]!
}

