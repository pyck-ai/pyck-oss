extend type Query {
  workflowActions(
    input: GetWorkflowActionsInput!
    where: WorkflowActionsWhereInput
  ): GetWorkflowActionsResponse!
}

input GetWorkflowActionsInput {
  workflowId: String!
  workflowExecutionId: String!
}

input WorkflowActionsWhereInput {
  """
  name field predicates
  """
  name: String
  nameNEQ: String
  nameIn: [String!]
  nameNotIn: [String!]
  nameContains: String
  nameHasPrefix: String
  nameHasSuffix: String
  nameEqualFold: String
  nameContainsFold: String

  enabled: Boolean
}

type GetWorkflowActionsResponse {
  queries: [ActionDefinition!]!
  updates: [ActionDefinition!]!
}

type ActionDefinition {
  name: String!
  description: String
  enabled: Boolean!
}
