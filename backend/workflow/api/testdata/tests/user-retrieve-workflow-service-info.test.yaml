---
name: "User - Retrieve Workflow Service Info"
description: >
  Verifies the workflowServiceInfo query returns version and date.
steps:
  - name: "Get service info"
    operation: workflow.getWorkflowServiceInfo
    tests:
      - msg: "Status is 200"
        assertions:
          - ref: res.status
            equal: 200
      - msg: "No GraphQL errors"
        assertions:
          - ref: res.body.errors
            nil: true
      - msg: "Version returned"
        assertions:
          - ref: res.body.data.workflowServiceInfo.version
            nil: false
