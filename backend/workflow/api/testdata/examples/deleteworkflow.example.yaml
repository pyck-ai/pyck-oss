---
operation: DeleteWorkflow
name: "Delete Workflow"
description: >
  Soft-deletes a registered workflow definition by ID.
vars:
  id: { $placeholder: "workflow definition ID" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Deleted ID returned"
    assertions:
      - ref: res.body.data.deleteWorkflow.deletedID
        equal: {$ref: req.body.variables.id}
