---
operation: GetWorkflowAssignee
name: "Get Workflow Assignee"
description: >
  Returns the current assignee of a workflow execution.
vars:
  input:
    workflowID: { $placeholder: "workflow execution ID" }
    runID: { $placeholder: "run ID" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Assignee returned"
    assertions:
      - ref: res.body.data.workflowAssignee.assignee
        nil: false
