---
operation: GetWorkflowServiceInfo
name: "Get Workflow Service Info"
description: >
  Returns service metadata including version and date.
vars: {}
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Service info returned"
    assertions:
      - ref: res.body.data.workflowServiceInfo.version
        nil: false
      - ref: res.body.data.workflowServiceInfo.date
        nil: false
