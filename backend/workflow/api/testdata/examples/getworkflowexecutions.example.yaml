---
operation: GetWorkflowExecutions
name: "Get Workflow Executions"
description: >
  Lists workflow executions from Temporal with optional filtering.
vars:
  first: 10
  orderBy:
    direction: DESC
    field: START_TIME
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Result set returned"
    assertions:
      - ref: res.body.data.workflowExecutions.totalCount
        nil: false
