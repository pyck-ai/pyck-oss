---
operation: GetReceivingInboundItems
name: "Get Receiving Inbound Items"
description: >
  Lists receiving inbound items with pagination and ordering.
vars:
  first: 10
  orderBy:
    direction: ASC
    field: SKU
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Connection structure is valid"
    assertions:
      - ref: res.body.data.receivingInboundItems
        nil: false
      - ref: res.body.data.receivingInboundItems.totalCount
        nil: false
