---
operation: PatchReceivingInboundShipmentNotificationData
name: "Patch Receiving Inbound Shipment Notification Data"
description: >
  Applies RFC 6902 JSON Patch operations to the receiving inbound shipment
  notification's data field. Only changed fields are modified; untouched
  fields are preserved. See
  https://datatracker.ietf.org/doc/html/rfc6902 for the specification.
vars:
  id: { $placeholder: "receiving inbound shipment notification id to patch" }
  patches:
    - op: REPLACE
      path: "/meta/name"
      value: "\"PatchedNotification\""
    - op: REPLACE
      path: "/sum"
      value: "42"
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Patched notification returned"
    assertions:
      - ref: res.body.data.patchReceivingInboundShipmentNotificationData.receivingInboundShipmentNotification
        nil: false
      - ref: res.body.data.patchReceivingInboundShipmentNotificationData.receivingInboundShipmentNotification.id
        equal: {$ref: req.body.variables.id}
