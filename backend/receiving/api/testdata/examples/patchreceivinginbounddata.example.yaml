---
operation: PatchReceivingInboundData
name: "Patch Receiving Inbound Data"
description: >
  Applies RFC 6902 JSON Patch operations to the inbound's data field.
  Only changed fields are modified; untouched fields are preserved.
  See https://datatracker.ietf.org/doc/html/rfc6902 for the specification.
vars:
  id: { $placeholder: "inbound id to patch" }
  patches:
    - op: REPLACE
      path: "/warehouse"
      value: "\"WH-B\""
    - op: ADD
      path: "/tags/-"
      value: "\"urgent\""
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Patched inbound returned"
    assertions:
      - ref: res.body.data.patchReceivingInboundData.receivingInbound
        nil: false
      - ref: res.body.data.patchReceivingInboundData.receivingInbound.id
        equal: {$ref: req.body.variables.id}
