---
operation: DeleteReceivingInboundItem
name: "Delete Receiving Inbound Item"
description: >
  Soft-deletes a receiving inbound item by ID.
vars:
  id: { $placeholder: "inbound item ID" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Deleted ID returned"
    assertions:
      - ref: res.body.data.deleteReceivingInboundItem.deletedID
        equal: {$ref: req.body.variables.id}
