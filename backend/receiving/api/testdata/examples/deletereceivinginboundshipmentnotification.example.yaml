---
operation: DeleteReceivingInboundShipmentNotification
name: "Delete Receiving Inbound Shipment Notification"
description: >
  Soft-deletes an inbound shipment notification by ID.
vars:
  id: { $placeholder: "notification ID" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Deleted ID returned"
    assertions:
      - ref: res.body.data.deleteReceivingInboundShipmentNotification.deletedID
        equal: {$ref: req.body.variables.id}
