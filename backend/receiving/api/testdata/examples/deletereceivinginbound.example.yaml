---
operation: DeleteReceivingInbound
name: "Delete Receiving Inbound"
description: >
  Soft-deletes a receiving inbound by ID.
vars:
  id: { $placeholder: "inbound ID" }
expect:
  - msg: "Status is 200"
    assertions:
      - ref: res.status
        equal: 200
  - msg: "No GraphQL errors"
    assertions:
      - ref: res.body.errors
        nil: true
  - msg: "Deleted ID returned"
    assertions:
      - ref: res.body.data.deleteReceivingInbound.deletedID
        equal: {$ref: req.body.variables.id}
