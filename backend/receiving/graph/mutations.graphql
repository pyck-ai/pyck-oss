type Mutation {
  createReceivingInbound(input: CreateReceivingInboundWithItemsInput!): ReceivingInboundOutput
  updateReceivingInbound(id: ID!, input: UpdateReceivingInboundInput!): ReceivingInboundOutput
  deleteReceivingInbound(id: ID!): ReceivingInboundDeletePayload!

  createReceivingInboundItem(input: CreateReceivingInboundItemInput!): ReceivingInboundItemOutput
  updateReceivingInboundItem(id: ID!, input: UpdateReceivingInboundItemInput!): ReceivingInboundItemOutput
  deleteReceivingInboundItem(id: ID!): ReceivingInboundItemDeletePayload!

  createReceivingInboundShipmentNotification(input: CreateReceivingInboundShipmentNotificationInput!): ReceivingInboundShipmentNotificationOutput
  updateReceivingInboundShipmentNotification(id: ID!, input: UpdateReceivingInboundShipmentNotificationInput!): ReceivingInboundShipmentNotificationOutput
  deleteReceivingInboundShipmentNotification(id: ID!): ReceivingInboundShipmentNotificationDeletePayload!
  """Apply RFC 6902 JSON Patch operations to the inbound's data field."""
  patchReceivingInboundData(id: ID!, patches: [JSONPatchInput!]!): ReceivingInboundOutput
  """Apply RFC 6902 JSON Patch operations to the inbound item's data field."""
  patchReceivingInboundItemData(id: ID!, patches: [JSONPatchInput!]!): ReceivingInboundItemOutput
  """Apply RFC 6902 JSON Patch operations to the receiving inbound shipment notification's data field."""
  patchReceivingInboundShipmentNotificationData(id: ID!, patches: [JSONPatchInput!]!): ReceivingInboundShipmentNotificationOutput
}

scalar UUID

input CreateReceivingInboundItemsInput {
  dataTypeID: UUID
  dataTypeSlug: String
  data: Map
  sku: String!
  quantity: Int!
}

input CreateReceivingInboundWithItemsInput {
  dataTypeID: UUID
  dataTypeSlug: String
  data: Map
  supplierID: UUID
  orderID: String
  inboundItems: [CreateReceivingInboundItemsInput]
}

type ReceivingInboundDeletePayload {
  deletedID: ID
  workflows: [TemporalWorkflow]
}

type ReceivingInboundItemDeletePayload {
  deletedID: ID
  workflows: [TemporalWorkflow]
}

type ReceivingInboundShipmentNotificationOutput {
  receivingInboundShipmentNotification: ReceivingInboundShipmentNotification
  workflows: [TemporalWorkflow]
}

type ReceivingInboundShipmentNotificationDeletePayload {
  deletedID: ID
  workflows: [TemporalWorkflow]
}