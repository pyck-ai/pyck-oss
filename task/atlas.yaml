version: "3.45"

tasks:
  atlas:migrate:
    desc: Run atlas migrations
    vars:
      NAME:
        sh: basename "{{.TASK_DIR}}"
    cmds:
      - >-
        docker compose
        -f "{{.TASKFILE_DIR}}/../docker-compose.yml"
        -f "{{.TASKFILE_DIR}}/../docker-compose.debug.yml"
        run
        --rm --interactive --tty --no-deps
        "{{.NAME}}"
        go run -mod=readonly ent/migrate/main.go {{.CLI_ARGS}}

