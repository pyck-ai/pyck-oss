info:
  name: User - Management KeyValue Unique Field Update
  type: folder
  seq: 1

docs: |-
  Regression test for #1142. When a key-value's DataType schema marks a field "unique": true, setKeyValue must exclude the entry's own row from the uniqueness check and run the check before persisting. Because setKeyValue is an upsert keyed on (tenant, user, name), re-setting an existing entry with an unchanged unique value, or to a new genuinely-unique value, must succeed — while setting it to a value already owned by a different entry is still rejected.


request:
  auth: inherit
