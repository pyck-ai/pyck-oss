info:
  name: User - Tenant Delete Restore Lifecycle
  type: folder
  seq: 1

docs: |-
  Exercises the synchronous half of the tenant delete/restore pipeline: registers a fresh tenant, deletes it, restores it without supplying a new expiry, exercises the already-active idempotent restore path, restores once more with an explicit new expiry, and finally deletes the tenant for cleanup. Does NOT wait for the async DisableTenantWorkflow / RestoreTenantWorkflow side-effects on Zitadel — that path is exercised end-to-end by the integration suite at integrations/tests/tenants/tn_lifecycle_test.go. Bruno covers only the resolver's direct DB writes to tenant.deleted_at and tenant.expires_at. Runs against the management subgraph through the gateway as the authenticated Bruno user; the resolver bumps to system context internally.


request:
  auth: inherit
