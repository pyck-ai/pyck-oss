docs: |-
  Sets or clears the tenant's expiry timestamp. Pass null to clear. System role required. The value is written directly to tenant.expires_at; the periodic tenant-expiry-check workflow soft-deletes the tenant once the timestamp is reached. Returns an error when the tenant does not exist; soft-deleted tenants are invisible to this mutation. Idempotent on the already-at-target-state cases.


