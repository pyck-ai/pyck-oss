docs: |-
  Removes one or more per-service roles from an existing user within a tenant. Idempotent — removing a role the user does not hold is a no-op. The user's ladder roles (reader/writer/admin) and any other service roles are preserved. Only per-service role keys are accepted (ladder roles are rejected). Tenant-admin only.


