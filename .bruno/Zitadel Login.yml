info:
  name: Zitadel Login
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{env_baseurl_management_query}}"
  body:
    query: |-
      # Code generated by github.com/pyck-ai/pyck/backend/common/cmd/brunogen. DO NOT EDIT.

      query GetMe {
        me {
          AssignedRoles {
            Role
            TenantID
          }
          Email
          FirstName
          LastName
          TenantID
          TenantName
          Tenants {
            ID
            Name
            Role
          }
          UserID
          Username
        }
      }
  auth:
    type: oauth2
    flow: authorization_code
    authorizationUrl: "{{env_zitadel_url}}/oauth/v2/authorize"
    accessTokenUrl: "{{env_zitadel_url}}/oauth/v2/token"
    credentials:
      clientId: "{{env_zitadel_client_id}}"
      placement: basic_auth_header
    scope: openid profile offline_access
    pkce: {}
    tokenConfig:
      id: pyck
      placement:
        header: Bearer
    settings:
      autoFetchToken: true
      autoRefreshToken: false

runtime:
  scripts:
    - type: tests
      code: |-
        test("Request is successful", function() {
          expect(res.status).to.equal(200);
          expect(res.body.errors).to.not.exist;
        });

        test("User is authenticated", function() {
          expect(res.body.data).to.exist;
          expect(res.body.data.me).to.exist;
          expect(res.body.data.me.Username).to.exist;
        });

        test("User has at least one tenant authorization", function() {
          expect(res.body.data.me.Tenants).to.be.an('array');
          expect(res.body.data.me.Tenants).to.have.lengthOf.at.least(1);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
