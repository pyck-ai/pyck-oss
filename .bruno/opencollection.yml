opencollection: 1.0.0

info:
  name: pyck
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  headers:
    - name: X-Pyck-Tenant-ID
      value: "{{env_pyck_tenant_id}}"
  auth:
    type: bearer
    token: "{{env_pyck_token}}"
  scripts:
    - type: before-request
      code: |-
        const tokenEnvVar = "env_pyck_token"
        const tenantIDEnvVar = "env_pyck_tenant_id"

        function decodeJWT(t) {
          // atob+padding avoids Buffer.from, which crashes Bruno's QuickJS
          // WASM sandbox ("memory access out of bounds") when t is missing
          // the payload segment or has malformed base64-url padding.
          if (typeof t !== 'string') return null;
          try {
            const parts = t.split('.');
            if (parts.length < 2) return null;
            const payload = parts[1].replace(/-/g, '+').replace(/_/g, '/');
            const padded = payload + '='.repeat((4 - payload.length % 4) % 4);
            return JSON.parse(atob(padded));
          } catch (e) {
            return null;
          }
        }

        function ensureTenantID() {
          const header = req.getHeader("X-Pyck-Tenant-ID")
          const body = req.getBody();

          if (header !== "{{" + tenantIDEnvVar + "}}") {
            return
          }

          let tenantID = bru.getEnvVar(tenantIDEnvVar)
          if (!tenantID) {
              tenantID = bru.getGlobalEnvVar(tenantIDEnvVar)
          }
          if (!tenantID) {
            tenantID = "all"
          }

          if (body && body.query && tenantID.trim() === "all") {
            const queryType = body.query
              .replace(/\s*#.*$/gm, '')
              .trim()
              .toLowerCase();

            if (queryType.startsWith('mutation')) {
              throw new Error(`[GraphQL] ❌ Using 'x-pyck-tenant-id: all' with mutations is deprecated.`);
            }
          }

          bru.setEnvVar(tenantIDEnvVar, tenantID)
          req.setHeader("X-Pyck-Tenant-ID", tenantID)
        }

        function ensureAuthentication() {
          const env = bru.getEnvName()

          if (!env) {
            throw new Error(`[Auth] ❌ No environment selected.`);
          }

          // First, we check whether the request has marked that it wants to use our dynamic authentication by setting the auth to the token env variable. If not, we skip the auth override alltogether.
          const header = req.getHeader("Authorization")
          
          if (header !== "Bearer {{" + tokenEnvVar + "}}") {
            return
          }
          
          // If the request is marked as using authentication, we use the token from the env if present. Otherwise we fall back to the collection-wide OAuth token.
          const overrideToken = bru.getEnvVar(tokenEnvVar)

          if (overrideToken) {
            bru.setEnvVar(tokenEnvVar, overrideToken)
            return
          }

          const accessToken = bru.getOauth2CredentialVar('$oauth2.pyck.access_token');
          const idToken = decodeJWT(bru.getOauth2CredentialVar('$oauth2.pyck.id_token'));
          const clientID = bru.getEnvVar('env_zitadel_client_id');

          if (accessToken && idToken && idToken.client_id === clientID) {
            bru.setEnvVar(tokenEnvVar, accessToken)
            return
          }

          throw new Error(`[Auth] 🛑 No token available. Please run 'Zitadel Login' once.`);
        }

        // Lazily initialize {{bru_idem_<suite>}} placeholders with a fresh
        // UUID, so each Bruno run gets a unique idempotency key per
        // suite. All steps in the suite that share the same placeholder
        // resolve to the same value (fresh→replay→mismatch chain works),
        // but the cached server-side row from a previous run no longer
        // poisons the new run.
        //
        // The header value in the test fixture stays literal:
        //   Idempotency-Key: "{{bru_idem_file}}"
        // and Bruno substitutes it at request-send time after this hook
        // has populated the var.
        // Resolved per-suite key vars are kept alphanumeric (no
        // hyphens) so the same value can also be embedded in fields
        // that require identifier-style strings, e.g. a workflow name:
        //   name: "BrunoIdem{{bru_idem_workflow}}"
        // Two var-name conventions:
        //   bru_idem_<svc>      → 16-char random hex (normal idempotency keys)
        //   bru_idem_<svc>_max  → 255-char string (16 hex + 239 'x') for the
        //                         maxLengthKey boundary test, randomized per
        //                         run so the cached row from a previous run
        //                         doesn't collide with per-run-fresh vars
        //                         (e.g. main-data's setupDT dataTypeID).
        function ensureIdempotencyKey() {
          const raw = req.getHeader("Idempotency-Key");
          if (!raw) return;
          const m = raw.match(/^\{\{(bru_idem_[A-Za-z0-9_]+)\}\}$/);
          if (!m) return;
          const varName = m[1];
          if (!bru.getVar(varName)) {
            // QuickJS sandbox has no crypto module — Math.random()
            // is sufficient for idempotency keys (only needs to be
            // unique within the cluster, not cryptographically secure).
            let val = '';
            for (let i = 0; i < 16; i++) {
              val += (Math.random() * 16 | 0).toString(16);
            }
            if (varName.endsWith('_max')) {
              val = val + 'x'.repeat(255 - val.length);
            }
            bru.setVar(varName, val);
          }
        }

        ensureTenantID();
        ensureAuthentication();
        ensureIdempotencyKey();
bundled: false
extensions: {}
